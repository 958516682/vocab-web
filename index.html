<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>词汇闯关 音频完整修复版</title>
<style>
:root {
    --bg-page: #0b0d1a;
    --bg-card: #22243b;
    --bg-btn-normal: #2c2e48;
    --bg-btn-active: #41a6ff;
    --text-main: #e8edff;
    --text-sub: #a0a8c7;
    --text-highlight: #63ccff;
    --border-normal: #383b5c;
    --border-active: #63ccff;
    --success-green: #66e088;
    --error-red: #ff6b6b;
    --warn-yellow: #ffc857;
    --shadow-card: 0 8px 30px rgba(0,0,0,0.35);
    --transition-fast: 0.2s ease;
}
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: system-ui, -apple-system, "Microsoft Yahei", sans-serif;
}
body {
    background: var(--bg-page);
    color: var(--text-main);
    min-height: 100vh;
    padding: 20px 12px;
    overflow-x: hidden;
    background-image: 
        radial-gradient(#232644 1px, transparent 1px),
        radial-gradient(#1c1f38 0.5px, transparent 0.5px),
        linear-gradient(160deg, #0b0d1a 0%, #141730 100%);
    background-size: 40px 40px, 15px 15px, 100% 100%;
    background-position: 0 0, 10px 10px, 0 0;
}
.page-header {
    text-align: center;
    margin-bottom: 24px;
}
.page-title {
    font-size: 32px;
    background: linear-gradient(90deg, #70d0ff, #41a6ff);
    -webkit-background-clip: text;
    color: transparent;
    font-weight: 700;
    letter-spacing: 2px;
    margin-bottom: 8px;
    text-shadow: 0 0 12px rgba(99, 204, 255, 0.4);
}
.page-subtitle {
    font-size: 14px;
    color: var(--text-sub);
}
.header-group-select {
    margin:10px 0;
    display:flex;
    align-items:center;
    justify-content:center;
    gap:8px;
    flex-wrap:wrap;
}
.header-buttons {
    display: flex;
    gap: 10px;
    justify-content: center;
    margin-top:12px;
    flex-wrap: wrap;
}
.header-btn {
    padding:10px 14px;
    border-radius:8px;
    border:1px solid var(--border-normal);
    background:var(--bg-btn-normal);
    color:var(--text-main);
    cursor:pointer;
    transition:var(--transition-fast);
    font-size:14px;
    min-height:44px;
    min-width:90px;
}
.listen-speaker-btn {
    display: none;
    margin: 0 auto 16px;
    padding: 12px 20px;
    font-size: 16px;
    gap:8px;
    width:100%;
    max-width:320px;
    justify-content:center;
}
.listen-speaker-btn.show {
    display: flex;
}
.main-wrap {
    max-width: 1100px;
    margin: 0 auto;
    background: var(--bg-card);
    border-radius: 14px;
    padding: 16px 12px;
}
.mode-tab-group {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 10px;
    margin-bottom: 20px;
}
.mode-tab {
    padding: 12px 6px;
    background: var(--bg-btn-normal);
    border: 1px solid var(--border-normal);
    border-radius: 8px;
    text-align: center;
    font-size: 14px;
    cursor: pointer;
    min-height:44px;
}
.mode-tab.active {
    background: linear-gradient(90deg, rgba(65, 166, 255, 0.15), rgba(99, 204, 255, 0.05));
    border-color: var(--border-active);
}
.star-tab-group {
    display: flex;
    gap: 10px;
    justify-content: center;
    margin-bottom: 24px;
    flex-wrap:wrap;
}
.star-tab {
    padding: 10px 20px;
    background: var(--bg-btn-normal);
    border: 1px solid var(--border-normal);
    border-radius: 8px;
    font-size: 15px;
    cursor: pointer;
    min-height:44px;
}
.star-tab.active {
    border-color: var(--border-active);
    background: rgba(65, 166, 255, 0.12);
}
.level-grid {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 8px;
}
.level-item {
    background: var(--bg-btn-normal);
    border: 1px solid var(--border-normal);
    border-radius: 8px;
    padding: 10px 4px;
    text-align: center;
    cursor: pointer;
    min-height:72px;
}
.level-item.lock {
    opacity:0.4;
    cursor:not-allowed;
}
.level-num {
    font-size: 18px;
    margin-bottom: 2px;
}
.level-count {
    font-size: 11px;
    color: var(--success-green);
}
.level-star {
    color: #ffd700;
    font-size:14px;
    margin-top:2px;
}
.level-star.empty {
    color:#444868;
}
.back-btn {
    padding: 10px 16px;
    background: var(--bg-btn-normal);
    border: 1px solid var(--border-normal);
    border-radius: 8px;
    font-size: 14px;
    cursor: pointer;
    margin-bottom: 20px;
    min-height:44px;
}
.answer-top-info {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 24px;
    font-size: 14px;
    color: var(--text-sub);
    flex-wrap:wrap;
}
.question-text {
    font-size: 28px;
    text-align: center;
    background: linear-gradient(90deg, #94d8ff, #63ccff);
    -webkit-background-clip: text;
    color: transparent;
    margin-bottom: 10px;
    min-height: 40px;
    word-break:break-all;
}
.question-tip {
    text-align: center;
    color: var(--text-sub);
    font-size: 14px;
    margin-bottom: 24px;
}
.answer-option-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    margin-bottom: 24px;
}
.answer-option {
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    padding: 18px 8px;
    background: var(--bg-btn-normal);
    border: 1px solid var(--border-normal);
    border-radius: 8px;
    text-align: center;
    font-size: 16px;
    cursor: pointer;
    min-height:80px;
    word-break:break-all;
}
.answer-option.right {
    border-color: var(--success-green);
    background: linear-gradient(135deg, rgba(102, 224, 136, 0.15), rgba(102, 224, 136, 0.03));
}
.answer-option.wrong {
    border-color: var(--error-red);
    background: linear-gradient(135deg, rgba(255, 107, 107, 0.15), rgba(255, 224, 136, 0.03));
}
.voice-icon {
    font-size: 16px;
    opacity: 0.7;
    cursor: pointer;
    padding: 3px 6px;
    border-radius: 4px;
    background: rgba(255,255,255,0.1);
    user-select: none;
}
.bottom-status {
    display: flex;
    justify-content: center;
    gap: 20px;
    font-size: 14px;
    flex-wrap: wrap;
}
.panel {
    display: none;
    opacity:0;
    transform: translateY(8px);
    transition: opacity 0.3s ease, transform 0.3s ease;
}
.panel.show {
    display: block;
    opacity:1;
    transform: translateY(0);
}
.mask {
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.75);
    z-index:999;
    display:none;
    align-items:center;
    justify-content:center;
    padding:12px;
    overflow-y:auto;
}
.mask.show {
    display:flex;
}
.modal-box {
    width:100%;
    max-width:460px;
    max-height:82vh;
    overflow-y:auto;
    background:var(--bg-card);
    border-radius:12px;
    padding:16px 14px;
}
.modal-title {
    display:flex;
    justify-content:space-between;
    align-items:center;
    font-size:18px;
    margin-bottom:16px;
}
.modal-close {
    font-size:22px;
    cursor:pointer;
    color:var(--text-sub);
}
.setting-row {
    margin:12px 0;
    display:flex;
    justify-content:space-between;
    align-items:center;
    gap:8px;
    flex-wrap: wrap;
}
.setting-row input, .setting-row select, #groupSelect {
    padding:8px 6px;
    background:var(--bg-btn-normal);
    border:1px solid var(--border-normal);
    color:var(--text-main);
    border-radius:6px;
    font-size:14px;
    flex:1;
    min-width:120px;
}
hr {
    border:none;
    border-top:1px solid var(--border-normal);
    margin:16px 0;
}
textarea {
    resize: vertical;
    width:100%;
    background:var(--bg-btn-normal);
    color:var(--text-main);
    border:1px solid var(--border-normal);
    border-radius:6px;
    padding:8px;
    font-size:14px;
    min-height:100px;
}
.pwd-input {
    width:100%;
    padding:10px 8px;
    font-size:16px;
    margin:10px 0 16px;
}
.pwd-tip {
    font-size:13px;
    color:var(--warn-yellow);
    text-align:center;
    margin-bottom:12px;
}
.match-mask {
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.88);
    z-index:1000;
    display:none;
    padding:12px;
    overflow-y:auto;
}
.match-mask.show {
    display:block;
}
.match-wrap {
    max-width:1100px;
    margin:0 auto;
    background:var(--bg-card);
    border-radius:14px;
    padding:16px 12px;
}
.match-header {
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:20px;
    flex-wrap:wrap;
    gap:10px;
}
.match-card-grid {
    display:grid;
    grid-template-columns: repeat(auto-fill, minmax(100px,1fr));
    gap:10px;
    margin-bottom:20px;
}
.match-card {
    padding:16px 6px;
    text-align:center;
    background:var(--bg-btn-normal);
    border:1px solid var(--border-normal);
    border-radius:8px;
    cursor:pointer;
    transition:0.3s ease;
    font-size:14px;
    min-height:70px;
}
.match-card.select {
    border-color:var(--border-active);
    box-shadow:0 0 10px rgba(99,204,255,0.3);
}
.match-card.match {
    animation: cardDisappear 0.4s ease forwards;
    pointer-events:none;
}
@keyframes cardDisappear {
    0% { opacity:1; transform: scale(1); }
    50% { opacity:0.6; transform: scale(1.1); background:rgba(102, 224, 136, 0.3); border-color:var(--success-green);}
    100% { opacity:0; transform: scale(0); height:0; margin:0; padding:0; border:none;}
}
.match-bottom-info {
    text-align:center;
    margin-top:16px;
    font-size:16px;
}
@media (max-width: 480px) {
    .level-grid {
        grid-template-columns: repeat(3, 1fr);
    }
    .answer-option-grid {
        grid-template-columns: 1fr;
    }
}
</style>
</head>
<body>
<div class="page-header">
    <h1 class="page-title">词汇闯关</h1>
    <p class="page-subtitle">自定义分组词库·四题型单词训练</p>
    <div class="header-group-select">
        <span>当前词库分组：</span>
        <select id="groupSelect"></select>
        <button class="header-btn" id="openGroupManageBtn">词库管理</button>
    </div>
    <div class="header-buttons">
        <button class="header-btn" id="wrongReviewBtn">错题复习</button>
        <button class="header-btn" id="openSettingBtn">全局设置</button>
    </div>
</div>

<div class="main-wrap">
    <div id="homePanel" class="panel show">
        <div class="mode-tab-group">
            <div class="mode-tab active" data-mode="cnToEn">看中文选英文</div>
            <div class="mode-tab" data-mode="enToCn">看英文选中文</div>
            <div class="mode-tab" data-mode="listenToCn">听音选中文</div>
            <div class="mode-tab" data-mode="matchLink">连线配对</div>
        </div>
        <div class="star-tab-group">
            <div class="star-tab active" data-star="1">一星 21关</div>
            <div class="star-tab" data-star="2">二星 36关</div>
        </div>
        <div class="level-grid" id="levelBox"></div>
    </div>

    <div id="answerPanel" class="panel">
        <div class="answer-top-info">
            <button class="back-btn" id="backHomeBtn">返回关卡</button>
            <span id="levelTag">一星 第1关</span>
        </div>
        <button class="header-btn listen-speaker-btn" id="listenSpeakerBtn">🔊 点击重复播放单词读音</button>
        <div class="question-text" id="qText">加法;增加;附加</div>
        <p class="question-tip" id="questionTip">请选择对应的英文单词</p>
        <div class="answer-option-grid" id="optionBox"></div>
        <div class="bottom-status">
            <span>进度 <b id="progressNum">1/30</b></span>
            <span>正确 <b id="rightNum">0</b></span>
            <span>错误 <b id="wrongNum">0</b></span>
            <span>连击 <b id="comboNum">0</b></span>
        </div>
    </div>
</div>

<!-- 管理员密码弹窗 -->
<div class="mask" id="pwdMask">
    <div class="modal-box">
        <div class="modal-title">
            <span>管理员验证</span>
            <span class="modal-close" id="closePwdMask">×</span>
        </div>
        <p class="pwd-tip">修改/导入词库需要管理员密码，学生无修改权限</p>
        <input class="pwd-input" id="pwdInput" type="password" placeholder="请输入管理密码">
        <div style="display:flex;gap:10px;justify-content:center;">
            <button class="header-btn" id="pwdCancelBtn">取消</button>
            <button class="header-btn" id="pwdConfirmBtn">确认验证</button>
        </div>
    </div>
</div>

<!-- 全局设置弹窗 -->
<div class="mask" id="settingMask">
    <div class="modal-box">
        <div class="modal-title">
            <span>全局配置设置</span>
            <span class="modal-close" id="closeSetting">×</span>
        </div>
        <div class="setting-row">
            <label>单词发音口音</label>
            <select id="voiceSet">
                <option value="us">美式发音</option>
                <option value="gb">英式发音</option>
            </select>
        </div>
        <div class="setting-row">
            <label>单关单词数量</label>
            <input type="number" min="5" max="50" id="perLevelSet" value="30">
        </div>
        <div class="setting-row">
            <label>答题音效开关</label>
            <input type="checkbox" id="soundSwitch" checked>
        </div>
        <div class="setting-row">
            <label>一键重置闯关进度</label>
            <button class="header-btn" id="resetProgressBtn">重置</button>
        </div>
        <div class="setting-row">
            <label>清空全部本地数据</label>
            <button class="header-btn" id="clearAllDataBtn">清空数据</button>
        </div>
        <div style="text-align:center;margin-top:20px;">
            <button class="header-btn" id="saveSettingBtn">保存设置</button>
        </div>
    </div>
</div>

<!-- 词库分组管理弹窗 -->
<div class="mask" id="groupMask">
    <div class="modal-box">
        <div class="modal-title">
            <span>词库分组管理（管理员）</span>
            <span class="modal-close" id="closeGroupMask">×</span>
        </div>
        <div class="setting-row">
            <label>新建分组名称</label>
            <input type="text" id="newGroupName" placeholder="七年级上册">
            <button class="header-btn" id="createGroupBtn">创建</button>
        </div>
        <div class="setting-row">
            <label>重命名当前分组</label>
            <input type="text" id="renameGroupInput" placeholder="输入新名称">
            <button class="header-btn" id="renameGroupBtn">重命名</button>
        </div>
        <div class="setting-row">
            <label>删除当前分组（课标基础组不可删）</label>
            <button class="header-btn" id="delGroupBtn">删除分组</button>
        </div>
        <hr>
        <div class="setting-row" style="flex-direction:column;align-items:flex-start;">
            <label>导入自定义词库（每行 英文|中文）</label>
            <textarea id="importTextarea" rows="6" placeholder="apple|苹果"></textarea>
            <div style="display:flex;gap:10px;flex-wrap:wrap;margin-top:8px;">
                <button class="header-btn" id="importWordBtn">追加导入</button>
                <button class="header-btn" id="replaceImportBtn">覆盖导入</button>
            </div>
        </div>
        <div class="setting-row">
            <label>导出当前分组词库（复制文本）</label>
            <button class="header-btn" id="exportWordBtn">导出复制</button>
        </div>
    </div>
</div>

<!-- 连线配对弹窗 -->
<div class="match-mask" id="matchMask">
    <div class="match-wrap">
        <div class="match-header">
            <h2>连线配对模式</h2>
            <button class="header-btn" id="closeMatchBtn">关闭返回</button>
        </div>
        <div class="match-card-grid" id="matchCardBox"></div>
        <div class="match-bottom-info">
            <span>配对成功：<b id="matchRight">0</b> / 总单词：<b id="matchTotal">0</b></span>
        </div>
    </div>
</div>

<script>
// ========== 基础配置 ==========
const ADMIN_PASSWORD = "admin123";
const AUDIO_CFG = {
    rightTone: { freq: 880, duration: 0.15, type: "sine" },
    wrongTone: { freq: 220, duration: 0.2, type: "triangle" },
    voiceAccent: "us",
    soundEnable: true
};
let audioCtx = null;
let voiceListCache = [];
let answeringLock = false;
let globalTimer = null;
let audioInitFlag = false;

// ========== 音频初始化（仅用户点击时执行，绕过浏览器限制） ==========
function initAudioOnce(){
    if(audioInitFlag) return;
    try{
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        audioInitFlag = true;
    }catch(e){
        console.log("音频初始化失败", e);
    }
}

// ========== 答对答错提示音 ==========
function playTone(type) {
    if (!AUDIO_CFG.soundEnable) return;
    initAudioOnce();
    if(!audioCtx) return;
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    const tone = type === "right" ? AUDIO_CFG.rightTone : AUDIO_CFG.wrongTone;
    osc.type = tone.type;
    osc.frequency.value = tone.freq;
    gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
    osc.start();
    osc.stop(audioCtx.currentTime + tone.duration);
}

// ========== 预加载人声列表 ==========
window.speechSynthesis.onvoiceschanged = function(){
    voiceListCache = window.speechSynthesis.getVoices();
};

// ========== 朗读单词（修复无声，兼容所有浏览器） ==========
function speakWord(word) {
    initAudioOnce();
    window.speechSynthesis.cancel();
    const utter = new SpeechSynthesisUtterance(word);
    const targetLang = AUDIO_CFG.voiceAccent === "us" ? "en-US" : "en-GB";
    const matchVoice = voiceListCache.find(v => v.lang === targetLang);
    if(matchVoice) utter.voice = matchVoice;
    utter.rate = 0.96;
    utter.volume = 1;
    window.speechSynthesis.speak(utter);
}

// ========== 全局常量 ==========
const CONFIG = {
    star1TotalLevel: 21,
    star2TotalLevel: 36,
    perLevelWordCount: 30,
    storageKeyProgress: "vocab_star_progress",
    storageKeyWrong: "vocab_wrong_words",
    storageKeySetting: "vocab_global_setting",
    storageKeyGroupList: "vocab_group_list",
    storageKeyGroupData: "vocab_group_data",
    storageKeyActiveGroup: "vocab_active_group",
    modeList: [
        {key:"cnToEn", name:"看中文选英文", tip:"请选择对应的英文单词", targetIsEn:true},
        {key:"enToCn", name:"看英文选中文", tip:"请选择对应的中文释义", targetIsEn:false},
        {key:"listenToCn", name:"听音选中文", tip:"点击喇叭播放单词，选择对应中文释义", targetIsEn:false, hideQuesText:true},
        {key:"matchLink", name:"连线配对", tip:"点击中英卡片进行配对", isMatchMode:true}
    ]
};
const WORD_LIB = [
    {en:"addition", cn:"加法;增加;附加"},
    {en:"attach", cn:"附上；依附"},
    {en:"anniversary", cn:"周年纪念日"},
    {en:"assume", cn:"假定；承担"},
    {en:"ability", cn:"能力；才能"},
    {en:"abnormal", cn:"反常的；异常的"},
    {en:"abolish", cn:"废除；废止"},
    {en:"abundant", cn:"大量的；丰盛的"},
    {en:"abuse", cn:"滥用；虐待"},
    {en:"accelerate", cn:"加速；促进"},
    {en:"access", cn:"通道；使用权"},
    {en:"accident", cn:"事故；意外"},
    {en:"accompany", cn:"陪伴；伴随"},
    {en:"accomplish", cn:"完成；实现"},
    {en:"account", cn:"账户；解释"}
];
const Storage = {
    get(key){
        try {
            const d = localStorage.getItem(key);
            return d ? JSON.parse(d) : null;
        } catch(err){
            console.error("读取存储失败", err);
            return null;
        }
    },
    set(key, val){
        try {
            localStorage.setItem(key, JSON.stringify(val));
        } catch(err){
            alert("浏览器本地存储已满，请清理缓存后重试");
        }
    },
    clear(key){
        localStorage.removeItem(key);
    },
    clearAll(){
        localStorage.clear();
    }
};
let state = {
    activeMode: "cnToEn",
    activeStar: 1,
    currentLevel: 1,
    progress: {},
    wrongWords: [],
    useWrongLib: false,
    levelWordList: [],
    currentAudioWord: "",
    qIndex: 0,
    rightCount: 0,
    wrongCount: 0,
    combo: 0,
    matchSelectCard: null,

function saveAllGroupData() {
    Storage.set(CONFIG.storageKeyGroupList, state.groupList);
    Storage.set(CONFIG.storageKeyGroupData, state.groupData);
    Storage.set(CONFIG.storageKeyActiveGroup, state.activeGroup);
    const allProgress = Storage.get(CONFIG.storageKeyProgress) || {};
    allProgress[state.activeGroup] = state.progress;
    Storage.set(CONFIG.storageKeyProgress, allProgress);
    const allWrong = Storage.get(CONFIG.storageKeyWrong) || {};
    allWrong[state.activeGroup] = state.wrongWords;
    Storage.set(CONFIG.storageKeyWrong, allWrong);
}
function parseImportText(text){
    const lines = text.trim().split("\n");
    const wordArr = [];
    for(let line of lines){
        const lineTrim = line.trim();
        if(!lineTrim) continue;
        const splitArr = lineTrim.split("|");
        if(splitArr.length >= 2){
            const en = splitArr[0].trim();
            const cn = splitArr.slice(1).join("|").trim();
            if(en && cn) wordArr.push({en, cn});
        }
    }
    return wordArr;
}
function renderGroupSelect(){
    el.groupSelect.innerHTML = "";
    state.groupList.forEach(name=>{
        const opt = document.createElement("option");
        opt.value = name;
        opt.innerText = name;
        if(name === state.activeGroup) opt.selected = true;
        el.groupSelect.appendChild(opt);
    })
}
function renderLevelGrid(){
    el.levelBox.innerHTML = "";
    const totalLv = state.activeStar === 1 ? CONFIG.star1TotalLevel : CONFIG.star2TotalLevel;
    let lastCompleteLv = 0;
    for(let i=1; i<=totalLv; i++){
        const key = `star${state.activeStar}_lv${i}`;
        if((state.progress[key] || 0) >= CONFIG.perLevelWordCount) lastCompleteLv = i;
    }
    for(let i=1; i<=totalLv; i++){
        const key = `star${state.activeStar}_lv${i}`;
        const finishCount = state.progress[key] || 0;
        const isComplete = finishCount >= CONFIG.perLevelWordCount;
        const isLock = i > lastCompleteLv + 1;
        const item = document.createElement("div");
        item.className = `level-item ${isLock ? "lock" : ""}`;
        item.innerHTML = `
            <div class="level-num">${i} ${isLock ? "🔒" : ""}</div>
            <div class="level-count">${finishCount}/${CONFIG.perLevelWordCount}</div>
            <div class="level-star ${isComplete ? "" : "empty"}">★</div>
        `;
        if(!isLock) item.onclick = ()=> startLevel(i);
        el.levelBox.appendChild(item);
    }
}
function openGroupMaskAfterPwd(){
    const inputPwd = el.pwdInput.value.trim();
    if(inputPwd === ADMIN_PASSWORD){
        el.pwdMask.classList.remove("show");
        el.pwdInput.value = "";
        el.groupMask.classList.add("show");
    }else{
        alert("密码错误，无权限修改词库");
        el.pwdInput.value = "";
    }
}

        const idx = state.groupList.indexOf(oldName);
        state.groupList[idx] = newName;

// ========== 闯关主逻辑 ==========
function startLevel(lvNum){
    state.currentLevel = lvNum;
    state.qIndex = 0;
    state.rightCount = 0;
    state.wrongCount = 0;
    state.combo = 0;
    answeringLock = false;
    clearTimeout(globalTimer);
    el.homePanel.classList.remove("show");
    el.answerPanel.classList.add("show");
    el.levelTag.innerText = `${state.activeStar === 1 ? "一星" : "二星"} 第${lvNum}关`;
    const modeInfo = CONFIG.modeList.find(m=>m.key === state.activeMode);
    el.questionTip.innerText = modeInfo.tip;
    if(state.activeMode === "listenToCn") el.listenSpeakerBtn.classList.add("show");
    else el.listenSpeakerBtn.classList.remove("show");
    const groupAllWords = state.groupData[state.activeGroup] || [];
    const startIdx = (lvNum - 1) * CONFIG.perLevelWordCount;
    state.levelWordList = [...groupAllWords].slice(startIdx, startIdx + CONFIG.perLevelWordCount);
    renderQuestion();
}
function startWrongReview(){
    state.qIndex = 0;
    state.rightCount = 0;
    state.wrongCount = 0;
    state.combo = 0;
    answeringLock = false;
    clearTimeout(globalTimer);
    el.levelTag.innerText = "错题专项复习";
    const modeInfo = CONFIG.modeList.find(m=>m.key === state.activeMode);
    el.questionTip.innerText = modeInfo.tip;
    if(state.activeMode === "listenToCn") el.listenSpeakerBtn.classList.add("show");
    else el.listenSpeakerBtn.classList.remove("show");
    state.levelWordList = [...state.wrongWords];
    renderQuestion();
}
function renderQuestion(){
    const word = state.levelWordList[state.qIndex];
    state.currentAudioWord = word.en;
    const modeInfo = CONFIG.modeList.find(m=>m.key === state.activeMode);
    if(state.activeMode === "cnToEn"){
        el.qText.innerText = word.cn;
    }else if(state.activeMode === "enToCn"){
        el.qText.innerText = word.en;
    }else if(state.activeMode === "listenToCn"){
        el.qText.innerText = "";
    }
    const options = getModeOptions(word, modeInfo.targetIsEn);
    el.optionBox.innerHTML = "";
    options.forEach(opt=>{
        const div = document.createElement("div");
        div.className = "answer-option";
        if(modeInfo.targetIsEn){
            div.innerHTML = `<span>${opt.en}</span><span class="voice-icon">🔊</span>`;
        }else{
            div.innerHTML = `<span>${opt.cn}</span>`;
        }
        div.onclick = function(e){
            initAudioOnce();
            if(modeInfo.targetIsEn && e.target.classList.contains("voice-icon")){
                e.stopPropagation();
                speakWord(opt.en);
                return;
            }
            selectAnswer(opt, word, modeInfo.targetIsEn);
        };
        el.optionBox.appendChild(div);
    });
    el.progressNum.innerText = `${state.qIndex+1}/${state.levelWordList.length}`;
    el.rightNum.innerText = state.rightCount;
    el.wrongNum.innerText = state.wrongCount;
    el.comboNum.innerText = state.combo;
}
function getModeOptions(targetWord, needEn){
    const poolAll = state.groupData[state.activeGroup] || WORD_LIB;
    if(needEn){
        const pool = poolAll.filter(w=>w.en !== targetWord.en);
        const rand = pool.sort(()=>Math.random()-0.5).slice(0,3);
        rand.push(targetWord);
        return rand.sort(()=>Math.random()-0.5);
    }else{
        const pool = poolAll.filter(w=>w.cn !== targetWord.cn);
        const rand = pool.sort(()=>Math.random()-0.5).slice(0,3);
        rand.push(targetWord);
        return rand.sort(()=>Math.random()-0.5);
    }
}
function selectAnswer(selWord, targetWord, targetIsEn){
    if(answeringLock) return;
    answeringLock = true;
    clearTimeout(globalTimer);
    const items = el.optionBox.querySelectorAll(".answer-option");
    items.forEach(item=>{
        const txt = item.querySelector("span").innerText;
        const rightTxt = targetIsEn ? targetWord.en : targetWord.cn;
        const selTxt = targetIsEn ? selWord.en : selWord.cn;
        if(txt === rightTxt) item.classList.add("right");
        if(txt === selTxt && txt !== rightTxt) item.classList.add("wrong");
    });
    speakWord(targetWord.en);
    setTimeout(()=>{
        const correct = targetIsEn ? selWord.en === targetWord.en : selWord.cn === targetWord.cn;
        if(correct){
            state.rightCount++;
            state.combo++;
            playTone("right");
        }else{
            state.wrongCount++;
            state.combo = 0;
            playTone("wrong");
            if(!state.useWrongLib){
                const repeat = state.wrongWords.some(w=>w.en === targetWord.en);
                if(!repeat){
                    state.wrongWords.push(targetWord);
                    const allWrong = Storage.get(CONFIG.storageKeyWrong) || {};
                    allWrong[state.activeGroup] = state.wrongWords;
                    Storage.set(CONFIG.storageKeyWrong, allWrong);
                }
            }
        }
        // 修复卡死，强制释放锁，保证自动跳转
        answeringLock = false;
        state.qIndex++;
        if(state.qIndex >= state.levelWordList.length){
            finishLevel();
            return;
        }
        renderQuestion();
    }, 1000);
}
function finishLevel(){
    clearTimeout(globalTimer);
    answeringLock = false;
    el.listenSpeakerBtn.classList.remove("show");
    if(!state.useWrongLib){
        const key = `star${state.activeStar}_lv${state.currentLevel}`;
        state.progress[key] = CONFIG.perLevelWordCount;
        const allProg = Storage.get(CONFIG.storageKeyProgress) || {};
        allProg[state.activeGroup] = state.progress;
        Storage.set(CONFIG.storageKeyProgress, allProg);
    }
    const total = state.rightCount + state.wrongCount;
    const rate = total > 0 ? Math.round(state.rightCount / total * 100) : 0;
    alert(`本关完成！
正确：${state.rightCount} 错误：${state.wrongCount}
最高连击：${state.combo} 正确率：${rate}%`);
    el.homePanel.classList.add("show");
    el.answerPanel.classList.remove("show");
    renderLevelGrid();
}

// ========== 配对完整逻辑 ==========
function openMatchMode(){
    const words = [...(state.groupData[state.activeGroup] || WORD_LIB)].slice(0, CONFIG.perLevelWordCount);
    state.matchRightNum = 0;
    state.matchSelectCard = null;
    el.matchRight.innerText = 0;
    el.matchTotal.innerText = words.length;
    el.matchMask.classList.add("show");
    renderMatchCards(words);
}
function renderMatchCards(wordList){
    el.matchCardBox.innerHTML = "";
    let arr = [];
    wordList.forEach(w=>{
        arr.push({type:"en", content:w.en, data:w});
        arr.push({type:"cn", content:w.cn, data:w});
    });
    arr = arr.sort(()=>Math.random()-0.5);
    arr.forEach(info=>{
        const div = document.createElement("div");
        div.className = "match-card";
        div.innerText = info.content;
        div.dataset.type = info.type;
        div.dataset.en = info.data.en;
        div.onclick = ()=> {
            initAudioOnce();
            clickMatchCard(div, info.data);
        };
        el.matchCardBox.appendChild(div);
    });
}
function clickMatchCard(dom, word
