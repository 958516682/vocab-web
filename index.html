<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>词汇闯关 配对分栏+听音朗读优化版</title>
<style>
:root {
    --bg-page: #0b0d1a;
    --bg-card: #22243b;
    --bg-btn-normal: #2c2e48;
    --bg-btn-active: #41a6ff;
    --text-main: #e8edff;
    --text-sub: #a0a8cc;
    --text-highlight: #63ccff;
    --border-normal: #383b5c;
    --border-active: #63ccff;
    --success-green: #66e088;
    --error-red: #ff6b6b;
    --warn-yellow: #ffc857;
    --shadow-card: 0 4px 12px rgba(0,0,0,0.35);
    --transition-fast: 0.2s ease;
    --base-font: 14px;
    --title-font: 22px;
    --btn-height: 38px;
    --gap-sm: 8px;
    --gap-md: 12px;
    --gap-lg: 16px;
    --card-padding: 12px;
}
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: system-ui, -apple-system, "Microsoft Yahei", sans-serif;
}
body {
    background: var(--bg-page);
    color: var(--text-main);
    min-height: 100vh;
    padding: var(--gap-md);
    overflow-x: hidden;
    font-size: var(--base-font);
}
.page-header {
    text-align: center;
    margin-bottom: var(--gap-lg);
}
.page-title {
    font-size: var(--title-font);
    background: linear-gradient(90deg, #70d0ff, #41a6ff);
    -webkit-background-clip: text;
    color: transparent;
    font-weight: 600;
    letter-spacing: 1px;
    margin-bottom: var(--gap-sm);
}
.page-subtitle {
    font-size: 12px;
    color: var(--text-sub);
}
.header-group-select {
    margin: var(--gap-md) 0;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: var(--gap-sm);
    flex-wrap: wrap;
}
.header-buttons {
    display: flex;
    gap: var(--gap-sm);
    justify-content: center;
    flex-wrap: wrap;
    margin-top: var(--gap-md);
}
.header-btn {
    padding: 0 10px;
    border-radius: 6px;
    border: 1px solid var(--border-normal);
    background: var(--bg-btn-normal);
    color: var(--text-main);
    cursor: pointer;
    transition: var(--transition-fast);
    font-size: 13px;
    min-height: var(--btn-height);
    min-width: 80px;
}
.header-btn:active {
    background: var(--bg-btn-active);
}
.listen-speaker-btn {
    display: none;
    margin: 0 auto var(--gap-md);
    padding: 10px 16px;
    font-size: 14px;
    width: 100%;
    max-width: 280px;
    justify-content: center;
}
.listen-speaker-btn.show {
    display: flex;
}
.main-wrap {
    max-width: 720px;
    margin: 0 auto;
    background: var(--bg-card);
    border-radius: 10px;
    padding: var(--card-padding);
}
.mode-tab-group {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: var(--gap-sm);
    margin-bottom: var(--gap-lg);
}
.mode-tab {
    padding: 10px 6px;
    background: var(--bg-btn-normal);
    border: 1px solid var(--border-normal);
    border-radius: 6px;
    text-align: center;
    font-size: 13px;
    cursor: pointer;
    min-height: 36px;
}
.mode-tab.active {
    background: linear-gradient(90deg, rgba(65, 166, 255, 0.15), rgba(99, 204, 255, 0.05));
    border-color: var(--border-active);
}
.star-tab-group {
    display: flex;
    gap: var(--gap-sm);
    justify-content: center;
    margin-bottom: var(--gap-lg);
    flex-wrap: wrap;
}
.star-tab {
    padding: 8px 14px;
    background: var(--bg-btn-normal);
    border: 1px solid var(--border-normal);
    border-radius: 6px;
    font-size: 13px;
    cursor: pointer;
    min-height: 36px;
}
.star-tab.active {
    border-color: var(--border-active);
    background: rgba(65, 166, 255, 0.12);
}
.level-grid {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: var(--gap-sm);
}
@media(max-width:480px){
    .level-grid {
        grid-template-columns: repeat(3, 1fr);
    }
}
.level-item {
    background: var(--bg-btn-normal);
    border: 1px solid var(--border-normal);
    border-radius: 6px;
    padding: 8px 4px;
    text-align: center;
    min-height: 60px;
}
.level-item.lock {
    opacity: 0.4;
    cursor: not-allowed;
}
.level-num {
    font-size: 16px;
    margin-bottom: 2px;
}
.level-count {
    font-size: 10px;
    color: var(--success-green);
}
.level-star {
    color: #ffd700;
    font-size: 12px;
    margin-top: 2px;
}
.level-star.empty {
    color: #444868;
}
.back-btn {
    padding: 0 12px;
    background: var(--bg-btn-normal);
    border: 1px solid var(--border-normal);
    border-radius: 6px;
    font-size: 13px;
    cursor: pointer;
    margin-bottom: var(--gap-md);
    min-height: var(--btn-height);
}
.answer-top-info {
    display: flex;
    align-items: center;
    gap: var(--gap-md);
    margin-bottom: var(--gap-lg);
    font-size: 13px;
    color: var(--text-sub);
    flex-wrap: wrap;
}
.question-text {
    font-size: 22px;
    text-align: center;
    background: linear-gradient(90deg, #94d8ff, #63ccff);
    -webkit-background-clip: text;
    color: transparent;
    margin-bottom: var(--gap-md);
    min-height: 36px;
    word-break: break-all;
}
.question-tip {
    text-align: center;
    color: var(--text-sub);
    font-size: 13px;
    margin-bottom: var(--gap-lg);
}
.answer-option-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: var(--gap-sm);
    margin-bottom: var(--gap-lg);
}
@media(max-width:480px){
    .answer-option-grid {
        grid-template-columns: 1fr;
    }
}
.answer-option {
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: var(--gap-sm);
    padding: 14px 8px;
    background: var(--bg-btn-normal);
    border: 1px solid var(--border-normal);
    border-radius: 8px;
    text-align: center;
    font-size: 14px;
    cursor: pointer;
    min-height: 70px;
    word-break: break-all;
}
.answer-option.right {
    border-color: var(--success-green);
    background: linear-gradient(135deg, rgba(102, 224, 136, 0.15), rgba(102, 224, 136, 0.03));
}
.answer-option.wrong {
    border-color: var(--error-red);
    background: linear-gradient(135deg, rgba(255, 107, 107, 0.15), rgba(255, 107, 107, 0.03));
}
.voice-icon {
    font-size: 15px;
    opacity: 0.7;
    cursor: pointer;
    padding: 2px 6px;
    border-radius: 4px;
    background: rgba(255,255,255,0.1);
    user-select: none;
}
.bottom-status {
    display: flex;
    justify-content: center;
    gap: var(--gap-md);
    font-size: 13px;
    flex-wrap: wrap;
}
.panel {
    display: none;
    opacity: 0;
    transform: translateY(6px);
    transition: opacity 0.3s ease, transform 0.3s ease;
}
.panel.show {
    display: block;
    opacity: 1;
    transform: translateY(0);
}
.mask {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.75);
    z-index: 999;
    display: none;
    align-items: center;
    justify-content: center;
    padding: var(--gap-md);
    overflow-y: auto;
}
.mask.show {
    display: flex;
}
.modal-box {
    width: 100%;
    max-width: 400px;
    max-height: 80vh;
    overflow-y: auto;
    background: var(--bg-card);
    border-radius: 10px;
    padding: var(--card-padding);
}
.modal-title {
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 16px;
    margin-bottom: var(--gap-md);
}
.modal-close {
    font-size: 20px;
    cursor: pointer;
    color: var(--text-sub);
}
.setting-row {
    margin: var(--gap-md) 0;
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: var(--gap-sm);
    flex-wrap: wrap;
}
.setting-row input, .setting-row select, #groupSelect {
    padding: 6px;
    background: var(--bg-btn-normal);
    border: 1px solid var(--border-normal);
    color: var(--text-main);
    border-radius: 6px;
    font-size: 13px;
    flex: 1;
    min-width: 120px;
}
hr {
    border: none;
    border-top: 1px solid var(--border-normal);
    margin: var(--gap-md) 0;
}
textarea {
    resize: vertical;
    width: 100%;
    background: var(--bg-btn-normal);
    color: var(--text-main);
    border: 1px solid var(--border-normal);
    border-radius: 6px;
    padding: 8px;
    font-size: 13px;
    min-height: 90px;
}
.pwd-input {
    width: 100%;
    padding: 8px;
    font-size: 14px;
    margin: var(--gap-md) 0;
    background: var(--bg-btn-normal);
    border: 1px solid var(--border-normal);
    border-radius: 6px;
    color: #fff;
}
.pwd-tip {
    font-size: 11px;
    color: var(--warn-yellow);
    text-align: center;
    margin-bottom: var(--gap-md);
}
.match-mask {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.88);
    z-index: 1000;
    display: none;
    padding: var(--gap-md);
    overflow-y: auto;
}
.match-mask.show {
    display: block;
}
.match-wrap {
    max-width: 720px;
    margin: 0 auto;
    background: var(--bg-card);
    border-radius: 10px;
    padding: var(--card-padding);
}
.match-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: var(--gap-md);
    flex-wrap: wrap;
    gap: var(--gap-sm);
}
/* 配对分两栏布局 英文左竖排 中文右竖排 */
.match-two-col {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: var(--gap-lg);
    margin-bottom: var(--gap-md);
}
.match-col-title {
    text-align: center;
    margin-bottom: var(--gap-sm);
    font-weight: bold;
    color: var(--text-highlight);
}
.match-list {
    display: flex;
    flex-direction: column;
    gap: var(--gap-sm);
}
.match-card {
    padding: 10px 6px;
    text-align: center;
    background: var(--bg-btn-normal);
    border: 1px solid var(--border-normal);
    border-radius: 6px;
    cursor: pointer;
    transition: 0.3s ease;
    font-size: 13px;
    min-height: 46px;
}
.match-card.select {
    border-color: var(--border-active);
    box-shadow: 0 0 8px rgba(99,204,255,0.3);
}
.match-card.match {
    opacity: 0.2;
    pointer-events: none;
}
.match-bottom-info {
    text-align: center;
    margin-top: var(--gap-md);
    font-size: 14px;
}
</style>
</head>
<body>
<div class="page-header">
    <h1 class="page-title">词汇闯关</h1>
    <p class="page-subtitle">自定义分组词库·四题型训练</p>
    <div class="header-group-select">
        <span>当前分组：</span>
        <select id="groupSelect"></select>
        <button class="header-btn" id="openGroupManageBtn">词库管理</button>
    </div>
    <div class="header-buttons">
        <button class="header-btn" id="wrongReviewBtn">错题复习</button>
        <button class="header-btn" id="openSettingBtn">设置</button>
    </div>
</div>

<div class="main-wrap">
    <div id="homePanel" class="panel show">
        <div class="mode-tab-group">
            <div class="mode-tab active" data-mode="cnToEn">中译英</div>
            <div class="mode-tab" data-mode="enToCn">英译中</div>
            <div class="mode-tab" data-mode="listenToCn">听音选词</div>
            <div class="mode-tab" data-mode="matchLink">单词配对</div>
        </div>
        <div class="star-tab-group">
            <div class="star-tab active" data-star="1">一星题库</div>
            <div class="star-tab" data-star="2">二星题库</div>
        </div>
        <div class="level-grid" id="levelBox"></div>
    </div>

    <div id="answerPanel" class="panel">
        <div class="answer-top-info">
            <button class="back-btn" id="backHomeBtn">返回选关</button>
            <span id="levelTag">一星 第1关</span>
        </div>
        <button class="listen-speaker-btn" id="listenSpeakerBtn">🔊 点击播放单词读音</button>
        <div class="question-text" id="qText">加法;增加;附加</div>
        <p class="question-tip" id="questionTip">点击顶部喇叭播放单词，选择对应释义</p>
        <div class="answer-option-grid" id="optionBox"></div>
        <div class="bottom-status">
            <span>进度 <b id="progressNum">1/30</b></span>
            <span>正确 <b id="rightNum">0</b></span>
            <span>错误 <b id="wrongNum">0</b></span>
            <span>连击 <b id="comboNum">0</b></span>
        </div>
    </div>
</div>

<div class="mask" id="pwdMask">
    <div class="modal-box">
        <div class="modal-title">
            <span>管理员验证</span>
            <span class="modal-close" id="closePwdMask">×</span>
        </div>
        <p class="pwd-tip">导入/修改词库需要管理员密码</p>
        <input class="pwd-input" id="pwdInput" type="password" placeholder="请输入密码">
        <div style="display:flex;gap:8px;justify-content:center;">
            <button class="header-btn" id="pwdCancelBtn">取消</button>
            <button class="header-btn" id="pwdConfirmBtn">确认进入</button>
        </div>
    </div>
</div>

<div class="mask" id="settingMask">
    <div class="modal-box">
        <div class="modal-title">
            <span>全局设置</span>
            <span class="modal-close" id="closeSettingMask">×</span>
        </div>
        <div class="setting-row">
            <label>单词发音口音</label>
            <select id="voiceSet">
                <option value="us">美式发音</option>
                <option value="gb">英式发音</option>
            </select>
        </div>
        <div class="setting-row">
            <label>单关单词数量</label>
            <input type="number" min="5" max="50" id="perLevelSet" value="30">
        </div>
        <div class="setting-row">
            <label>开启答题提示音</label>
            <input type="checkbox" id="soundSwitch" checked>
        </div>
        <hr>
        <div class="setting-row">
            <label>一键清空闯关记录</label>
            <button class="header-btn" id="resetProgressBtn">重置</button>
        </div>
        <div class="setting-row">
            <label>清空全部本地数据</label>
            <button class="header-btn" id="clearAllDataBtn">清除</button>
        </div>
        <div style="text-align:center;margin-top:12px;">
            <button class="header-btn" id="saveSettingBtn">保存设置</button>
        </div>
    </div>
</div>

<div class="mask" id="groupMask">
    <div class="modal-box">
        <div class="modal-title">
            <span>自定义词库管理</span>
            <span class="modal-close" id="closeGroupMask">×</span>
        </div>
        <div class="setting-row">
            <label>新建分组名称</label>
            <input type="text" id="newGroupName" placeholder="输入分组名">
            <button class="header-btn" id="createGroupBtn">创建</button>
        </div>
        <div class="setting-row">
            <label>删除当前分组</label>
            <button class="header-btn" id="delGroupBtn">删除</button>
        </div>
        <hr>
        <label>批量导入单词（格式：英文|中文，一行一组）</label>
        <textarea id="importTextarea" rows="6" placeholder="addition|加法;增加;附加"></textarea>
        <div style="display:flex;gap:8px;margin-top:10px;justify-content:center;">
            <button class="header-btn" id="importWordBtn">追加导入</button>
            <button class="header-btn" id="replaceImportBtn">覆盖当前词库</button>
        </div>
        <hr>
        <div style="text-align:center;">
            <button class="header-btn" id="exportWordBtn">导出全部单词</button>
        </div>
    </div>
</div>

<!-- 单词配对弹窗 全新双栏布局容器 -->
<div class="match-mask" id="matchMask">
    <div class="match-wrap">
        <div class="match-header">
            <h3>单词配对游戏</h3>
            <button class="header-btn" id="closeMatchBtn">关闭</button>
        </div>
        <div class="match-two-col">
            <div class="match-left-col">
                <div class="match-col-title">英文单词</div>
                <div class="match-list" id="enListBox"></div>
            </div>
            <div class="match-right-col">
                <div class="match-col-title">中文释义</div>
                <div class="match-list" id="cnListBox"></div>
            </div>
        </div>
        <div class="match-bottom-info">
            <span>配对完成：<b id="matchRight">0</b> / 总单词 <b id="matchTotal">0</b></span>
        </div>
    </div>
</div>

<script>
const ADMIN_PASSWORD = "admin123";
const AUDIO_CFG = {
    rightTone: { freq: 880, duration: 0.15, type: "sine" },
    wrongTone: { freq: 220, duration: 0.2, type: "triangle" },
    voiceAccent: "us",
    soundEnable: true
};
let audioCtx = null;
let voiceListCache = [];
let voiceReady = false;
let answeringLock = false;
let globalTimer = null;
let audioInitFlag = false;

function initAudioOnce(){
    if(audioInitFlag) return;
    try{
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        audioInitFlag = true;
    }catch(e){}
}
function playTone(type) {
    if (!AUDIO_CFG.soundEnable) return;
    initAudioOnce();
    if(!audioCtx) return;
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    const tone = type === "right" ? AUDIO_CFG.rightTone : AUDIO_CFG.wrongTone;
    osc.type = tone.type;
    osc.frequency.value = tone.freq;
    gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
    osc.start();
    osc.stop(audioCtx.currentTime + tone.duration);
}
window.speechSynthesis.onvoiceschanged = function(){
    voiceListCache = window.speechSynthesis.getVoices();
    if(voiceListCache.length > 0) voiceReady = true;
};
async function speakWord(word) {
    initAudioOnce();
    window.speechSynthesis.cancel();
    let waitCount = 0;
    while(!voiceReady && waitCount < 20){
        await new Promise(res=>setTimeout(res,100));
        voiceListCache = window.speechSynthesis.getVoices();
        if(voiceListCache.length>0) voiceReady=true;
        waitCount++;
    }
    const utter = new SpeechSynthesisUtterance(word);
    const targetLang = AUDIO_CFG.voiceAccent === "us" ? "en-US" : "en-GB";
    const matchVoice = voiceListCache.find(v => v.lang === targetLang);
    if(matchVoice) utter.voice = matchVoice;
    utter.rate = 0.96;
    utter.volume = 1;
    window.speechSynthesis.speak(utter);
}
const WORD_LIB = [
    {en:"addition", cn:"加法;增加;附加"},
    {en:"attach", cn:"附上；依附"},
    {en:"anniversary", cn:"周年纪念日"},
    {en:"assume", cn:"假定；承担"},
    {en:"ability", cn:"能力；才能"},
    {en:"abnormal", cn:"反常的；异常的"},
    {en:"abolish", cn:"废除；废止"},
    {en:"abundant", cn:"大量的；丰盛的"},
    {en:"abuse", cn:"滥用；虐待"},
    {en:"accelerate", cn:"加速；促进"},
    {en:"access", cn:"通道；使用权"},
    {en:"accident", cn:"事故；意外"},
    {en:"accompany", cn:"陪伴；伴随"},
    {en:"accomplish", cn:"完成；实现"},
    {en:"account", cn:"账户；解释"}
];
const Storage = {
    get(key){
        try {
            const d = localStorage.getItem(key);
            return d ? JSON.parse(d) : null;
        } catch(err){return null;}
    },
    set(key, val){
        try {localStorage.setItem(key, JSON.stringify(val));}
        catch(err){alert("浏览器存储已满，请清理缓存");}
    },
    clear(key){localStorage.removeItem(key);},
    clearAll(){localStorage.clear();}
};
let state = {
    activeMode: "cnToEn",
    activeStar: 1,
    currentLevel: 1,
    progress: Storage.get("vocab_progress") || {},
    wrongWords: Storage.get("vocab_wrong") || [],
    useWrongLib: false,
    levelWordList: [],
    currentAudioWord: "",
    qIndex: 0,
    rightCount: 0,
    wrongCount: 0,
    combo: 0,
    matchSelectCard: null,
    matchFinishNum: 0,
    groupList: Storage.get("vocab_group") || ["课标基础组"],
    groupWordData: Storage.get("vocab_group_data") || {"课标基础组":WORD_LIB},
    activeGroup: Storage.get("vocab_active_group") || "课标基础组",
    tempImportText: ""
};
const el = {
    homePanel: document.getElementById("homePanel"),
    answerPanel: document.getElementById("answerPanel"),
    levelBox: document.getElementById("levelBox"),
    backHomeBtn: document.getElementById("backHomeBtn"),
    levelTag: document.getElementById("levelTag"),
    qText: document.getElementById("qText"),
    questionTip: document.getElementById("questionTip"),
    optionBox: document.getElementById("optionBox"),
    progressNum: document.getElementById("progressNum"),
    rightNum: document.getElementById("rightNum"),
    wrongNum: document.getElementById("wrongNum"),
    comboNum: document.getElementById("comboNum"),
    modeTabs: document.querySelectorAll(".mode-tab"),
    starTabs: document.querySelectorAll(".star-tab"),
    listenSpeakerBtn: document.getElementById("listenSpeakerBtn"),
    pwdMask: document.getElementById("pwdMask"),
    closePwdMask: document.getElementById("closePwdMask"),
    pwdInput: document.getElementById("pwdInput"),
    pwdCancelBtn: document.getElementById("pwdCancelBtn"),
    pwdConfirmBtn: document.getElementById("pwdConfirmBtn"),
    settingMask: document.getElementById("settingMask"),
    closeSettingMask: document.getElementById("closeSettingMask"),
    voiceSet: document.getElementById("voiceSet"),
    perLevelSet: document.getElementById("perLevelSet"),
    soundSwitch: document.getElementById("soundSwitch"),
    openSettingBtn: document.getElementById("openSettingBtn"),
    saveSettingBtn: document.getElementById("saveSettingBtn"),
    resetProgressBtn: document.getElementById("resetProgressBtn"),
    clearAllDataBtn: document.getElementById("clearAllDataBtn"),
    groupSelect: document.getElementById("groupSelect"),
    openGroupManageBtn: document.getElementById("openGroupManageBtn"),
    groupMask: document.getElementById("groupMask"),
    closeGroupMask: document.getElementById("closeGroupMask"),
    newGroupName: document.getElementById("newGroupName"),
    createGroupBtn: document.getElementById("createGroupBtn"),
    delGroupBtn: document.getElementById("delGroupBtn"),
    importTextarea: document.getElementById("importTextarea"),
    importWordBtn: document.getElementById("importWordBtn"),
    replaceImportBtn: document.getElementById("replaceImportBtn"),
    exportWordBtn: document.getElementById("exportWordBtn"),
    wrongReviewBtn: document.getElementById("wrongReviewBtn"),
    matchMask: document.getElementById("matchMask"),
    enListBox: document.getElementById("enListBox"),
    cnListBox: document.getElementById("cnListBox"),
    closeMatchBtn: document.getElementById("closeMatchBtn"),
    matchRight: document.getElementById("matchRight"),
    matchTotal: document.getElementById("matchTotal")
};
function saveAllGroupData() {
    Storage.set("vocab_group", state.groupList);
    Storage.set("vocab_group_data", state.groupWordData);
    Storage.set("vocab_active_group", state.activeGroup);
    Storage.set("vocab_progress", state.progress);
    Storage.set("vocab_wrong", state.wrongWords);
}
function parseImportText(text){
    const lines = text.trim().split("\n");
    const arr = [];
    for(let line of lines){
        const t = line.trim();
        if(!t || !t.includes("|")) continue;
        const [en, cn] = t.split("|");
        arr.push({en:en.trim(), cn:cn.trim()});
    }
    return arr;
}
function renderGroupSelect(){
    el.groupSelect.innerHTML = "";
    state.groupList.forEach(name=>{
        const opt = document.createElement("option");
        opt.value = name;
        opt.innerText = name;
        if(name === state.activeGroup) opt.selected = true;
        el.groupSelect.appendChild(opt);
    })
}
function renderLevelGrid(){
    el.levelBox.innerHTML = "";
    const maxLevel = state.activeStar === 1 ? 21 : 36;
    for(let i=1; i<=maxLevel; i++){
        const key = `${state.activeGroup}_star${state.activeStar}_lv${i}`;
        const done = state.progress[key] === true;
        const item = document.createElement("div");
        if(state.activeStar === 1 && i === 1){
            item.className = "level-item";
            item.onclick = ()=> startLevel(i);
        }else{
            item.className = done ? "level-item" : "level-item lock";
            if(done) item.onclick = ()=> startLevel(i);
        }
        item.innerHTML = `
            <div class="level-num">${i}</div>
            <div class="level-count">${(state.activeStar===1&&i===1)?"可进入":done?"已完成":"未解锁"}</div>
            <div class="level-star ${done?"":"empty"}">★</div>
        `;
        el.levelBox.appendChild(item);
    }
}
function openGroupMaskAfterPwd(){
    const inputPwd = el.pwdInput.value.trim();
    if(inputPwd === ADMIN_PASSWORD){
        el.pwdMask.classList.remove("show");
        el.pwdInput.value = "";
        el.groupMask.classList.add("show");
    }else{
        alert("密码错误");
    }
}
function startLevel(lvNum){
    state.currentLevel = lvNum;
    state.qIndex = 0;
    state.rightCount = 0;
    state.wrongCount = 0;
    state.combo = 0;
    answeringLock = false;
    clearTimeout(globalTimer);
    el.homePanel.classList.remove("show");
    el.answerPanel.classList.add("show");
    el.levelTag.innerText = `${state.activeStar===1?"一星":"二星"} 第${lvNum}关`;
    const total = Number(el.perLevelSet.value);
    const allWords = state.groupWordData[state.activeGroup] || WORD_LIB;
    const shuffle = [...allWords].sort(()=>Math.random()-0.5);
    state.levelWordList = shuffle.slice(0, Math.min(total, shuffle.length));
    state.useWrongLib = false;
    const modeInfo = getCurrentModeInfo();
    el.questionTip.innerText = modeInfo.tip;
    el.listenSpeakerBtn.classList.toggle("show", modeInfo.hideQuesText === true);
    renderQuestion();
}
function getCurrentModeInfo(){
    const modeMap = {
        cnToEn:{name:"中译英", tip:"选择对应的英文单词", hideQuesText:false},
        enToCn:{name:"英译中", tip:"选择对应的中文释义", hideQuesText:false},
        listenToCn:{name:"听音选词", tip:"点击顶部喇叭播放单词，选择对应释义，答对自动朗读下一题", hideQuesText:true},
        matchLink:{name:"单词配对", tip:"左侧英文、右侧中文，点英文可朗读，匹配对应释义", hideQuesText:false}
    };
    return modeMap[state.activeMode];
}
function renderQuestion(){
    const word = state.levelWordList[state.qIndex];
    state.currentAudioWord = word.en;
    const modeInfo = getCurrentModeInfo();
    if(state.activeMode === "cnToEn") el.qText.innerText = word.cn;
    else if(state.activeMode === "enToCn") el.qText.innerText = word.en;
    else if(state.activeMode === "listenToCn") el.qText.innerText = "";
    const allPool = state.groupWordData[state.activeGroup];
    const rightItem = word;
    let optList = [rightItem];
    const rest = allPool.filter(w=>w.en !== word.en).sort(()=>Math.random()-0.5);
    optList = optList.concat(rest.slice(0,3));
    optList = optList.sort(()=>Math.random()-0.5);
    el.optionBox.innerHTML = "";
    optList.forEach(opt=>{
        const div = document.createElement("div");
        div.className = "answer-option";
        if(state.activeMode === "cnToEn"){
            div.innerHTML = `<span>${opt.en}</span><span class="voice-icon">🔊</span>`;
        }else{
            div.innerHTML = `<span>${opt.cn}</span>`;
        }
        div.onclick = function(e){
            initAudioOnce();
            if(e.target.classList.contains("voice-icon")){
                e.stopPropagation();
                speakWord(opt.en);
                return;
            }
            selectAnswer(opt, word, state.activeMode);
        };
        el.optionBox.appendChild(div);
    });
    el.progressNum.innerText = `${state.qIndex+1}/${state.levelWordList.length}`;
    el.rightNum.innerText = state.rightCount;
    el.wrongNum.innerText = state.wrongCount;
    el.comboNum.innerText = state.combo;
}
function selectAnswer(selWord, realWord, mode){
    if(answeringLock) return;
    answeringLock = true;
    clearTimeout(globalTimer);
    const items = el.optionBox.querySelectorAll(".answer-option");
    let isCorrect = selWord.en === realWord.en;
    items.forEach(item=>{
        const txt = item.querySelector("span").innerText;
        let targetEn;
        if(mode === "cnToEn"){
            targetEn = txt;
        }else{
            const match = state.groupWordData[state.activeGroup].find(w=>w.cn === txt);
            targetEn = match ? match.en : "";
        }
        if(targetEn === realWord.en){
            item.classList.add("right");
        }else if(targetEn === selWord.en && !isCorrect){
            item.classList.add("wrong");
        }
    });
    speakWord(realWord.en);
    setTimeout(()=>{
        if(isCorrect){
            state.rightCount++;
            state.combo++;
            playTone("right");
        }else{
            state.wrongCount++;
            state.combo = 0;
            playTone("wrong");
            if(!state.wrongWords.find(w=>w.en === realWord.en)){
                state.wrongWords.push(realWord);
                saveAllGroupData();
            }
        }
        answeringLock = false;
        state.qIndex++;
        if(state.qIndex >= state.levelWordList.length){
            finishLevelTask();
            return;
        }
        renderQuestion();
        // 听音选词答对跳转新题目后自动朗读下一个单词
        if(state.activeMode === "listenToCn"){
            setTimeout(()=>{
                initAudioOnce();
                speakWord(state.levelWordList[state.qIndex].en);
            },300);
        }
    }, 1000);
}
function finishLevelTask(){
    clearTimeout(globalTimer);
    answeringLock = false;
    el.listenSpeakerBtn.classList.remove("show");
    const key = `${state.activeGroup}_star${state.activeStar}_lv${state.currentLevel}`;
    state.progress[key] = true;
    saveAllGroupData();
    const total = state.levelWordList.length;
    const rate = total===0 ? 0 : Math.round(state.rightCount / total * 100);
    alert(`本关完成！
答对：${state.rightCount} / ${total}
正确率：${rate}%
最高连击：${state.combo}`);
    el.answerPanel.classList.remove("show");
    el.homePanel.classList.add("show");
    renderLevelGrid();
}
// 全新双栏配对渲染逻辑 修复空白
function openMatchGame(){
    el.matchMask.classList.add("show");
    state.matchFinishNum = 0;
    const rawList = [...state.groupWordData[state.activeGroup]].sort(()=>Math.random()-0.5);
    const useList = rawList.slice(0,8);
    state.matchTotalNum = useList.length;
    el.matchTotal.innerText = state.matchTotalNum;
    el.matchRight.innerText = state.matchFinishNum;
    // 清空左右两栏
    el.enListBox.innerHTML = "";
    el.cnListBox.innerHTML = "";
    const enData = [];
    const cnData = [];
    useList.forEach(w=>{
        enData.push({type:"en", content:w.en, data:w});
        cnData.push({type:"cn", content:w.cn, data:w});
    });
    // 分别渲染左右竖向列表
    enData.forEach(info=>{
        const div = document.createElement("div");
        div.className = "match-card";
        div.innerText = info.content;
        div.dataset.en = info.data.en;
        div.dataset.type = info.type;
        div.onclick = ()=>{
            initAudioOnce();
            speakWord(info.data.en);
            matchCardClick(div, info);
        };
        el.enListBox.appendChild(div);
    });
    cnData.sort(()=>Math.random()-0.5);
    cnData.forEach(info=>{
        const div = document.createElement("div");
        div.className = "match-card";
        div.innerText = info.content;
        div.dataset.en = info.data.en;
        div.dataset.type = info.type;
        div.onclick = ()=>{
            initAudioOnce();
            matchCardClick(div, info);
        };
        el.cnListBox.appendChild(div);
    })
}
function matchCardClick(dom, info){
    if(dom.classList.contains("match")) return;
    if(!state.matchSelectCard){
        state.matchSelectCard = dom;
        dom.classList.add("select");
    }else{
        const prevDom = state.matchSelectCard;
        const prevEn = prevDom.dataset.en;
        const curEn = dom.dataset.en;
        if(prevEn === curEn && prevDom.dataset.type !== dom.dataset.type){
            prevDom.classList.remove("select");
            dom.classList.remove("select");
            prevDom.classList.add("match");
            dom.classList.add("match");
            state.matchFinishNum++;
            el.matchRight.innerText = state.matchFinishNum;
            playTone("right");
        }else{
            prevDom.classList.remove("select");
        }
        state.matchSelectCard = null;
    }
}
function bindAllEvent(){
    el.listenSpeakerBtn.onclick = function(){
        initAudioOnce();
        if(state.currentAudioWord) speakWord(state.currentAudioWord);
    };
    el.modeTabs.forEach(tab=>{
        tab.onclick = function(){
            el.modeTabs.forEach(t=>t.classList.remove("active"));
            this.classList.add("active");
            state.activeMode = this.dataset.mode;
            if(state.activeMode === "matchLink"){
                openMatchGame();
            }else{
                renderLevelGrid();
            }
        };
    });
    el.starTabs.forEach(tab=>{
        tab.onclick = function(){
            el.starTabs.forEach(t=>t.classList.remove("active"));
            this.classList.add("active");
            state.activeStar = Number(this.dataset.star);
            renderLevelGrid();
        };
    });
    el.backHomeBtn.onclick = function(){
        clearTimeout(globalTimer);
        el.answerPanel.classList.remove("show");
        el.homePanel.classList.add("show");
        renderLevelGrid();
    };
    el.openGroupManageBtn.onclick = function(){
        el.pwdMask.classList.add("show");
        el.pwdInput.value = "";
    };
    el.closePwdMask.onclick = ()=> el.pwdMask.classList.remove("show");
    el.pwdCancelBtn.onclick = ()=> el.pwdMask.classList.remove("show");
    el.pwdConfirmBtn.onclick = openGroupMaskAfterPwd;
    el.closeGroupMask.onclick = ()=> el.groupMask.classList.remove("show");
    el.createGroupBtn.onclick = function(){
        const name = el.newGroupName.value.trim();
        if(!name){alert("请输入分组名称");return;}
        if(state.groupList.includes(name)){alert("分组已存在");return;}
        state.groupList.push(name);
        state.groupWordData[name] = [...WORD_LIB];
        state.activeGroup = name;
        renderGroupSelect();
        saveAllGroupData();
        el.newGroupName.value = "";
        alert("分组创建成功");
    };
    el.delGroupBtn.onclick = function(){
        if(state.groupList.length <=1){alert("至少保留一个分组");return;}
        if(!confirm(`确认删除【${state.activeGroup}】？词库数据将清空`)) return;
        state.groupList = state.groupList.filter(g=>g !== state.activeGroup);
        delete state.groupWordData[state.activeGroup];
        state.activeGroup = state.groupList[0];
        renderGroupSelect();
        saveAllGroupData();
        alert("删除完成");
    };
    el.importWordBtn.onclick = function(){
        const text = el.importTextarea.value;
        const arr = parseImportText(text);
        if(arr.length ===0){alert("未识别有效单词");return;}
        state.groupWordData[state.activeGroup] = state.groupWordData[state.activeGroup].concat(arr);
        saveAllGroupData();
        el.importTextarea.value = "";
        alert(`成功导入${arr.length}组单词`);
    };
    el.replaceImportBtn.onclick = function(){
        const text = el.importTextarea.value;
        const arr = parseImportText(text);
        if(arr.length ===0){alert("未识别有效单词");return;}
        state.groupWordData[state.activeGroup] = arr;
        saveAllGroupData();
        el.importTextarea.value = "";
        alert(`已覆盖，共${arr.length}组单词`);
    };
    el.exportWordBtn.onclick = async function(){
        const list = state.groupWordData[state.activeGroup];
        let str = "";
        list.forEach(w=> str += `${w.en}|${w.cn}\n`);
        await navigator.clipboard.writeText(str);
        alert("单词文本已复制到剪贴板");
    };
    el.groupSelect.onchange = function(){
        state.activeGroup = this.value;
        saveAllGroupData();
        renderLevelGrid();
    };
    el.wrongReviewBtn.onclick = function(){
        if(state.wrongWords.length ===0){alert("暂无错题");return;}
        state.useWrongLib = true;
        state.levelWordList = [...state.wrongWords].sort(()=>Math.random()-0.5);
        state.qIndex = 0;
        state.rightCount = 0;
        state.wrongCount = 0;
        state.combo = 0;
        el.homePanel.classList.remove("show");
        el.answerPanel.classList.add("show");
        el.levelTag.innerText = "错题复习模式";
        renderQuestion();
    };
    el.openSettingBtn.onclick = ()=> el.settingMask.classList.add("show");
    el.closeSettingMask.onclick = ()=> el.settingMask.classList.remove("show");
    el.saveSettingBtn.onclick = function(){
        AUDIO_CFG.voiceAccent = el.voiceSet.value;
        AUDIO_CFG.soundEnable = el.soundSwitch.checked;
        saveAllGroupData();
        el.settingMask.classList.remove("show");
        alert("设置已保存");
    };
    el.resetProgressBtn.onclick = function(){
        if(!confirm("清空全部关卡完成记录？")) return;
        state.progress = {};
        saveAllGroupData();
        renderLevelGrid();
        alert("闯关记录已重置");
    };
    el.clearAllDataBtn.onclick = function(){
        if(!confirm("将清空分组、词库、闯关、错题全部数据，无法恢复！")) return;
        Storage.clearAll();
        location.reload();
    };
    el.closeMatchBtn.onclick = ()=> el.matchMask.classList.remove("show");
}
function pageInit(){
    renderGroupSelect();
    renderLevelGrid();
    bindAllEvent();
    el.voiceSet.value = AUDIO_CFG.voiceAccent;
    el.soundSwitch.checked = AUDIO_CFG.soundEnable;
}
pageInit();
</script>
