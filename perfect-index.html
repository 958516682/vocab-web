<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>词汇闯关 完整优化版</title>
<style>
:root {
    --bg-page: #0b0d1a;
    --bg-card: #22243b;
    --bg-btn-normal: #2c2e48;
    --bg-btn-active: #41a6ff;
    --text-main: #e8edff;
    --text-sub: #a0a8cc;
    --text-highlight: #63ccff;
    --border-normal: #383b5c;
    --border-active: #63ccff;
    --success-green: #66e088;
    --error-red: #ff6b6b;
    --warn-yellow: #ffc857;
    --shadow-card: 0 4px 12px rgba(0,0,0,0.35);
    --transition-fast: 0.2s ease;
    --base-font: 14px;
    --title-font: 22px;
    --btn-height: 38px;
    --gap-sm: 8px;
    --gap-md: 12px;
    --gap-lg: 16px;
    --card-padding: 12px;
}
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: system-ui, -apple-system, "Microsoft Yahei", sans-serif;
}
body {
    background: var(--bg-page);
    color: var(--text-main);
    min-height: 100vh;
    padding: var(--gap-md);
    overflow-x: hidden;
    font-size: var(--base-font);
}
.page-header {
    text-align: center;
    margin-bottom: var(--gap-lg);
}
.page-title {
    font-size: var(--title-font);
    background: linear-gradient(90deg, #70d0ff, #41a6ff);
    -webkit-background-clip: text;
    color: transparent;
    font-weight: 600;
    letter-spacing: 1px;
    margin-bottom: var(--gap-sm);
}
.page-subtitle {
    font-size: 12px;
    color: var(--text-sub);
}
.header-group-select {
    margin: var(--gap-md) 0;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: var(--gap-sm);
    flex-wrap: wrap;
}
.header-buttons {
    display: flex;
    gap: var(--gap-sm);
    justify-content: center;
    flex-wrap: wrap;
    margin-top: var(--gap-md);
}
.header-btn {
    padding: 0 10px;
    border-radius: 6px;
    border: 1px solid var(--border-normal);
    background: var(--bg-btn-normal);
    color: var(--text-main);
    cursor: pointer;
    transition: var(--transition-fast);
    font-size: 13px;
    min-height: var(--btn-height);
    min-width: 80px;
}
.header-btn:active {
    background: var(--bg-btn-active);
}
.listen-speaker-btn {
    display: none;
    margin: 0 auto var(--gap-md);
    padding: 10px 16px;
    font-size: 14px;
    width: 100%;
    max-width: 280px;
    justify-content: center;
}
.listen-speaker-btn.show {
    display: flex;
}
.main-wrap {
    max-width: 720px;
    margin: 0 auto;
    background: var(--bg-card);
    border-radius: 10px;
    padding: var(--card-padding);
}
.mode-tab-group {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: var(--gap-sm);
    margin-bottom: var(--gap-lg);
}
.mode-tab {
    padding: 10px 6px;
    background: var(--bg-btn-normal);
    border: 1px solid var(--border-normal);
    border-radius: 6px;
    text-align: center;
    font-size: 13px;
    cursor: pointer;
    min-height: 36px;
}
.mode-tab.active {
    background: linear-gradient(90deg, rgba(65, 166, 255, 0.15), rgba(99, 204, 255, 0.05));
    border-color: var(--border-active);
}
.star-tab-group {
    display: flex;
    gap: var(--gap-sm);
    justify-content: center;
    margin-bottom: var(--gap-lg);
    flex-wrap: wrap;
}
.star-tab {
    padding: 8px 14px;
    background: var(--bg-btn-normal);
    border: 1px solid var(--border-normal);
    border-radius: 6px;
    font-size: 13px;
    cursor: pointer;
    min-height: 36px;
}
.star-tab.active {
    border-color: var(--border-active);
    background: rgba65, 166, 255, 0.12);
}
.level-grid {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: var(--gap-sm);
}
@media(max-width:480px){
    .level-grid {
        grid-template-columns: repeat(3, 1fr);
    }
}
.level-item {
    background: var(--bg-btn-normal);
    border: 1px solid var(--border-normal);
    border-radius: 6px;
    padding: 8px 4px;
    text-align: center;
    min-height: 60px;
    cursor: pointer;
    transition: var(--transition-fast);
}
.level-item:hover {
    border-color: var(--border-active);
}
.level-item.lock {
    opacity: 0.4;
    cursor: not-allowed;
    pointer-events: none;
}
.level-num {
    font-size: 16px;
    margin-bottom: 2px;
}
.level-count {
    font-size: 10px;
    color: var(--success-green);
    line-height: 1.4;
}
.level-star {
    color: #ffd700;
    font-size: 12px;
    margin-top: 2px;
}
.level-star.empty {
    color: #444868;
}
.back-btn {
    padding: 0 12px;
    background: var(--bg-btn-normal);
    border: 1px solid var(--border-normal);
    border-radius: 6px;
    font-size: 13px;
    cursor: pointer;
    margin-bottom: var(--gap-md);
    min-height: var(--btn-height);
    transition: var(--transition-fast);
}
.back-btn:hover {
    border-color: var(--border-active);
}
.answer-top-info {
    display: flex;
    align-items: center;
    gap: var(--gap-md);
    margin-bottom: var(--gap-lg);
    font-size: 13px;
    color: var(--text-sub);
    flex-wrap: wrap;
}
.question-text {
    font-size: 22px;
    text-align: center;
    background: linear-gradient(90deg, #94d8ff, #63ccff);
    -webkit-background-clip: text;
    color: transparent;
    margin-bottom: var(--gap-md);
    min-height: 36px;
    word-break: break-all;
}
.question-tip {
    text-align: center;
    color: var(--text-sub);
    font-size: 13px;
    margin-bottom: var(--gap-lg);
}
.answer-option-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: var(--gap-sm);
    margin-bottom: var(--gap-lg);
}
@media(max-width:480px){
    .answer-option-grid {
        grid-template-columns: 1fr;
    }
}
.answer-option {
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: var(--gap-sm);
    padding: 14px 8px;
    background: var(--bg-btn-normal);
    border: 1px solid var(--border-normal);
    border-radius: 8px;
    text-align: center;
    font-size: 14px;
    cursor: pointer;
    min-height: 70px;
    word-break: break-all;
    transition: var(--transition-fast);
}
.answer-option:hover {
    border-color: var(--border-active);
}
.answer-option.right {
    border-color: var(--success-green);
    background: linear-gradient(135deg, rgba(102, 224, 136, 0.15), rgba(102, 224, 136, 0.03));
}
.answer-option.wrong {
    border-color: var(--error-red);
    background: linear-gradient(135deg, rgba(255, 107, 107, 0.15), rgba(255, 107, 107, 0.03));
}
.voice-icon {
    font-size: 15px;
    opacity: 0.7;
    cursor: pointer;
    padding: 2px 6px;
    border-radius: 4px;
    background: rgba(255,255,255,0.1);
    user-select: none;
    transition: var(--transition-fast);
}
.voice-icon:hover {
    opacity: 1;
    background: rgba(255,255,255,0.2);
}
.bottom-status {
    display: flex;
    justify-content: center;
    gap: var(--gap-md);
    font-size: 13px;
    flex-wrap: wrap;
}
.panel {
    display: none;
    opacity: 0;
    transform: translateY(6px);
    transition: opacity 0.3s ease, transform 0.3s ease;
}
.panel.show {
    display: block;
    opacity: 1;
    transform: translateY(0);
}
.mask {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.75);
    z-index: 999;
    display: none;
    align-items: center;
    justify-content: center;
    padding: var(--gap-md);
    overflow-y: auto;
}
.mask.show {
    display: flex;
}
.modal-box {
    width: 100%;
    max-width: 400px;
    max-height: 80vh;
    overflow-y: auto;
    background: var(--bg-card);
    border-radius: 10px;
    padding: var(--card-padding);
}
.modal-title {
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 16px;
    margin-bottom: var(--gap-md);
}
.modal-close {
    font-size: 20px;
    cursor: pointer;
    color: var(--text-sub);
    transition: var(--transition-fast);
}
.modal-close:hover {
    color: var(--text-highlight);
}
.setting-row {
    margin: var(--gap-md) 0;
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: var(--gap-sm);
    flex-wrap: wrap;
}
.setting-row input, .setting-row select, #groupSelect {
    padding: 6px;
    background: var(--bg-btn-normal);
    border: 1px solid var(--border-normal);
    color: var(--text-main);
    border-radius: 6px;
    font-size: 13px;
    flex: 1;
    min-width: 120px;
}
hr {
    border: none;
    border-top: 1px solid var(--border-normal);
    margin: var(--gap-md) 0;
}
textarea {
    resize: vertical;
    width: 100%;
    background: var(--bg-btn-normal);
    color: var(--text-main);
    border: 1px solid var(--border-normal);
    border-radius: 6px;
    padding: 8px;
    font-size: 13px;
    min-height: 90px;
}
.pwd-input {
    width: 100%;
    padding: 8px;
    font-size: 14px;
    margin: var(--gap-md) 0;
    background: var(--bg-btn-normal);
    border: 1px solid var(--border-normal);
    border-radius: 6px;
    color: #fff;
}
.pwd-tip {
    font-size: 11px;
    color: var(--warn-yellow);
    text-align: center;
    margin-bottom: var(--gap-md);
}
.match-mask {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.88);
    z-index: 1000;
    display: none;
    padding: var(--gap-md);
    overflow-y: auto;
}
.match-mask.show {
    display: block;
}
.match-wrap {
    max-width: 720px;
    margin: 0 auto;
    background: var(--bg-card);
    border-radius: 10px;
    padding: var(--card-padding);
}
.match-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: var(--gap-md);
    flex-wrap: wrap;
    gap: var(--gap-sm);
}
.match-two-col {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: var(--gap-lg);
    margin-bottom: var(--gap-md);
}
.match-col-title {
    text-align: center;
    margin-bottom: var(--gap-sm);
    font-weight: bold;
    color: var(--text-highlight);
}
.match-list {
    display: flex;
    flex-direction: column;
    gap: var(--gap-sm);
}
.match-card {
    padding: 10px 6px;
    text-align: center;
    background: var(--bg-btn-normal);
    border: 1px solid var(--border-normal);
    border-radius: 6px;
    cursor: pointer;
    transition: 0.3s ease;
    font-size: 13px;
    min-height: 46px;
}
.match-card:hover {
    border-color: var(--border-active);
}
.match-card.select {
    border-color: var(--border-active);
    box-shadow: 0 0 8px rgba(99,204,255,0.3);
}
.match-card.match {
    opacity: 0.2;
    pointer-events: none;
}
.match-bottom-info {
    text-align: center;
    margin-top: var(--gap-md);
    font-size: 14px;
    display: flex;
    justify-content: center;
    gap: 20px;
    flex-wrap: wrap;
}
.loading-tip {
    text-align: center;
    color: var(--text-sub);
    padding: 20px 0;
    font-size: 14px;
}
</style>
</head>
<body>
<div class="page-header">
    <h1 class="page-title">词汇闯关</h1>
    <p class="page-subtitle">自定义分组词库·四题型训练</p>
    <div class="header-group-select">
        <span>当前分组：</span>
        <select id="groupSelect"></select>
        <button class="header-btn" id="openGroupManageBtn">词库管理</button>
    </div>
    <div class="header-buttons">
        <button class="header-btn" id="wrongReviewBtn">错题复习</button>
        <button class="header-btn" id="openSettingBtn">设置</button>
    </div>
</div>

<div class="main-wrap">
    <div id="homePanel" class="panel show">
        <div class="mode-tab-group">
            <div class="mode-tab active" data-mode="cnToEn">中译英</div>
            <div class="mode-tab" data-mode="enToCn">英译中</div>
            <div class="mode-tab" data-mode="listenToCn">听音选词</div>
            <div class="mode-tab" data-mode="matchLink">单词配对</div>
        </div>
        <div class="star-tab-group">
            <div class="star-tab active" data-star="1">一星题库</div>
            <div class="star-tab" data-star="2">二星题库</div>
        </div>
        <div class="level-grid" id="levelBox"></div>
    </div>

    <div id="answerPanel" class="panel">
        <div class="answer-top-info">
            <button class="back-btn" id="backHomeBtn">返回选关</button>
            <span id="levelTag">一星 第1关</span>
        </div>
        <button class="listen-speaker-btn" id="listenSpeakerBtn">🔊 点击播放单词读音</button>
        <div class="question-text" id="qText">加法;增加;附加</div>
        <p class="question-tip" id="questionTip">点击顶部喇叭播放单词，选择对应释义，答对自动朗读下一题</p>
        <div class="answer-option-grid" id="optionBox"></div>
        <div class="bottom-status">
            <span>进度 <b id="progressNum">1/30</b></span>
            <span>正确 <b id="rightNum">0</b></span>
            <span>错误 <b id="wrongNum">0</b></span>
            <span>连击 <b id="comboNum">0</b></span>
        </div>
    </div>
</div>

<div class="mask" id="pwdMask">
    <div class="modal-box">
        <div class="modal-title">
            <span>管理员验证</span>
            <span class="modal-close" id="closePwdMask">×</span>
        </div>
        <p class="pwd-tip">导入/修改词库需要管理员密码</p>
        <input class="pwd-input" id="pwdInput" type="password" placeholder="请输入密码">
        <div style="display:flex;gap:8px;justify-content:center;">
            <button class="header-btn" id="pwdCancelBtn">取消</button>
            <button class="header-btn" id="pwdConfirmBtn">确认进入</button>
        </div>
    </div>
</div>

<div class="mask" id="settingMask">
    <div class="modal-box">
        <div class="modal-title">
            <span>全局设置</span>
            <span class="modal-close" id="closeSettingMask">×</span>
        </div>
        <div class="setting-row">
            <label>单词发音口音</label>
            <select id="voiceSet">
                <option value="us">美式发音</option>
                <option value="gb">英式发音</option>
            </select>
        </div>
        <div class="setting-row">
            <label>单关单词数量</label>
            <input type="number" min="5" max="50" id="perLevelSet" value="30">
            <span style="color:var(--text-sub);font-size:12px;">当前分组词库总量：<span id="wordCountTip">0</span></span>
        </div>
        <div class="setting-row">
            <label>开启答题提示音</label>
            <input type="checkbox" id="soundSwitch" checked>
        </div>
        <hr>
        <div class="setting-row">
            <label>一键清空闯关记录</label>
            <button class="header-btn" id="resetProgressBtn">重置</button>
        </div>
        <div class="setting-row">
            <label>清空全部本地数据</label>
            <button class="header-btn" id="clearAllDataBtn">清除</button>
        </div>
        <div style="text-align:center;margin-top:12px;">
            <button class="header-btn" id="saveSettingBtn">保存设置</button>
        </div>
    </div>
</div>

<div class="mask" id="groupMask">
    <div class="modal-box">
        <div class="modal-title">
            <span>自定义词库管理</span>
            <span class="modal-close" id="closeGroupMask">×</span>
        </div>
        <div class="setting-row">
            <label>新建分组名称</label>
            <input type="text" id="newGroupName" placeholder="输入分组名">
            <button class="header-btn" id="createGroupBtn">创建</button>
        </div>
        <div class="setting-row">
            <label>删除当前分组</label>
            <button class="header-btn" id="delGroupBtn">删除</button>
        </div>
        <hr>
        <label>批量导入单词（格式：英文 中文，空格分隔，一行一组）</label>
        <textarea id="importTextarea" rows="6" placeholder="addition 加法;增加;附加
apple 苹果
banana 香蕉"></textarea>
        <div style="display:flex;gap:8px;margin-top:10px;justify-content:center;">
            <button class="header-btn" id="importWordBtn">追加导入</button>
            <button class="header-btn" id="replaceImportBtn">覆盖当前词库</button>
        </div>
        <hr>
        <div style="text-align:center;">
            <button class="header-btn" id="exportWordBtn">导出全部单词</button>
        </div>
    </div>
</div>

<div class="match-mask" id="matchMask">
    <div class="match-wrap">
        <div class="match-header">
            <h3>单词配对游戏</h3>
            <div style="display:flex;gap:8px;">
                <button class="header-btn" id="prevMatchPageBtn">上一页</button>
                <button class="header-btn" id="nextMatchPageBtn">下一页</button>
                <button class="header-btn" id="closeMatchBtn">关闭</button>
            </div>
        </div>
        <div class="match-two-col">
            <div class="match-left-col">
                <div class="match-col-title">英文单词</div>
                <div class="match-list" id="enListBox"></div>
            </div>
            <div class="match-right-col">
                <div class="match-col-title">中文释义</div>
                <div class="match-list" id="cnListBox"></div>
            </div>
        </div>
        <div class="match-bottom-info">
            <span id="matchPageTip">第1页 / 共4页</span>
            <span>本页配对：<b id="matchCurPage">0</b>/<b id="matchCurPageTotal">8</b></span>
            <span>总进度：<b id="matchTotalDone">0</b>/<b id="matchAllTotal">30</b></span>
        </div>
    </div>
</div>

<script>
// 核心配置（统一管理）
const CONFIG = {
    ADMIN_PASSWORD: "admin123",
    AUDIO: {
        rightTone: { freq: 880, duration: 0.15, type: "sine" },
        wrongTone: { freq: 220, duration: 0.2, type: "triangle" },
        voiceAccent: "us",
        soundEnable: true
    },
    DEFAULT_WORD_COUNT_PER_LEVEL: 30, // 单关默认单词数
    MATCH_PAGE_SIZE: 8, // 配对每页数量
    DEFAULT_WORD_LIB: [ // 扩展默认词库到30个，解决数量不足问题
        {en:"addition", cn:"加法;增加;附加"},
        {en:"attach", cn:"附上；依附"},
        {en:"anniversary", cn:"周年纪念日"},
        {en:"assume", cn:"假定；承担"},
        {en:"ability", cn:"能力；才能"},
        {en:"abnormal", cn:"反常的；异常的"},
        {en:"abolish", cn:"废除；废止"},
        {en:"abundant", cn:"大量的；丰盛的"},
        {en:"abuse", cn:"滥用；虐待"},
        {en:"accelerate", cn:"加速；促进"},
        {en:"access", cn:"通道；使用权"},
        {en:"accident", cn:"事故；意外"},
        {en:"accompany", cn:"陪伴；伴随"},
        {en:"accomplish", cn:"完成；实现"},
        {en:"account", cn:"账户；解释"},
        {en:"achieve", cn:"达到；实现"},
        {en:"acid", cn:"酸；酸性的"},
        {en:"acknowledge", cn:"承认；感谢"},
        {en:"acquire", cn:"获得；取得"},
        {en:"adapt", cn:"适应；改编"},
        {en:"adequate", cn:"足够的；适当的"},
        {en:"adjust", cn:"调整；校正"},
        {en:"administration", cn:"管理；行政"},
        {en:"admire", cn:"钦佩；赞美"},
        {en:"admit", cn:"承认；准许进入"},
        {en:"adopt", cn:"采用；收养"},
        {en:"adult", cn:"成年人；成年的"},
        {en:"advance", cn:"前进；提前"},
        {en:"advantage", cn:"优势；好处"},
        {en:"adventure", cn:"冒险；奇遇"}
    ]
};

// 全局状态管理
let state = {
    activeMode: "cnToEn",
    activeStar: 1,
    currentLevel: 1,
    progress: {},
    wrongWords: [],
    useWrongLib: false,
    levelWordList: [],
    currentAudioWord: "",
    qIndex: 0,
    rightCount: 0,
    wrongCount: 0,
    combo: 0,
    // 配对相关
    matchAllWords: [],
    matchPageSize: CONFIG.MATCH_PAGE_SIZE,
    matchCurPage: 1,
    matchTotalPage: 1,
    matchCurPageFinish: 0,
    matchAllFinish: 0,
    matchSelectCard: null,
    // 分组相关
    groupList: [],
    groupWordData: {},
    activeGroup: "",
    tempImportText: "",
    // 配置相关
    perLevelWordCount: CONFIG.DEFAULT_WORD_COUNT_PER_LEVEL
};

// DOM元素缓存
const el = {
    homePanel: document.getElementById("homePanel"),
    answerPanel: document.getElementById("answerPanel"),

// 音频相关
let audioCtx = null;
let voiceListCache = [];
let voiceReady = false;
let answeringLock = false;
let globalTimer = null;
let audioInitFlag = false;

// 本地存储工具类
const Storage = {
    get(key) {
        try {
            const d = localStorage.getItem(key);
            return d ? JSON.parse(d) : null;
        } catch (err) {
            console.error("读取存储失败：", err);
            return null;
        }
    },
    set(key, val) {
        try {
            localStorage.setItem(key, JSON.stringify(val));
        } catch (err) {
            alert("浏览器存储已满，请清理缓存后重试");
            console.error("写入存储失败：", err);
        }
    },
    clear(key) {
        localStorage.removeItem(key);
    },
    clearAll() {
        localStorage.clear();
    }
};

// 初始化存储数据
function initStorageData() {
    state.progress = Storage.get("vocab_progress") || {};
    state.wrongWords = Storage.get("vocab_wrong") || [];
    state.groupList = Storage.get("vocab_group") || ["课标基础组"];
    state.groupWordData = Storage.get("vocab_group_data") || {
        "课标基础组": CONFIG.DEFAULT_WORD_LIB
    };
    state.activeGroup = Storage.get("vocab_active_group") || "课标基础组";
    state.perLevelWordCount = Storage.get("vocab_per_level_count") || CONFIG.DEFAULT_WORD_COUNT_PER_LEVEL;
    el.perLevelSet.value = state.perLevelWordCount;
}

// 音频初始化（仅初始化一次）
function initAudioOnce() {
    if (audioInitFlag) return;
    try {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        audioInitFlag = true;
    } catch (e) {
        console.error("音频上下文初始化失败：", e);
    }
}

// 播放提示音
function playTone(type) {
    if (!CONFIG.AUDIO.soundEnable) return;
    initAudioOnce();
    if (!audioCtx) return;

    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.connect(gain);
    gain.connect(audioCtx.destination);

    const tone = type === "right" ? CONFIG.AUDIO.rightTone : CONFIG.AUDIO.wrongTone;
    osc.type = tone.type;
    osc.frequency.value = tone.freq;
    gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
    
    osc.start();
    osc.stop(audioCtx.currentTime + tone.duration);
}

// 语音合成初始化
function initVoiceSynthesis() {
    function updateVoiceList() {
        voiceListCache = window.speechSynthesis.getVoices();
        voiceReady = voiceListCache.length > 0;
    }
    window.speechSynthesis.onvoiceschanged = updateVoiceList;
    updateVoiceList();
}

// 朗读单词
async function speakWord(word) {
    if (!word) return;
    initAudioOnce();
    window.speechSynthesis.cancel();

    let waitCount = 0;
    while (!voiceReady && waitCount < 20) {
        await new Promise(res => setTimeout(res, 100));
        voiceListCache = window.speechSynthesis.getVoices();
        voiceReady = voiceListCache.length > 0;
        waitCount++;
    }

    const utter = new SpeechSynthesisUtterance(word);
    const targetLang = CONFIG.AUDIO.voiceAccent === "us" ? "en-US" : "en-GB";
    const matchVoice = voiceListCache.find(v => v.lang === targetLang);
    
    if (matchVoice) utter.voice = matchVoice;
    utter.rate = 0.96;
    utter.volume = 1;
    utter.lang = targetLang;

    window.speechSynthesis.speak(utter);
}

// 保存所有分组/进度数据
function saveAllData() {
    Storage.set("vocab_group", state.groupList);
    Storage.set("vocab_group_data", state.groupWordData);
    Storage.set("vocab_active_group", state.activeGroup);
    Storage.set("vocab_progress", state.progress);
    Storage.set("vocab_wrong", state.wrongWords);
    Storage.set("vocab_per_level_count", state.perLevelWordCount);
}

// 解析导入的单词文本
function parseImportText(text) {
    const lines = text.trim().split("\n");
    const arr = [];

    for (let line of lines) {
        const t = line.trim();
        if (!t) continue;
        const firstSpaceIdx = t.indexOf(" ");
        if (firstSpaceIdx === -1) continue;

        const en = t.substring(0, firstSpaceIdx).trim();
        const cn = t.substring(firstSpaceIdx + 1).trim();
        
        if (en && cn) {
            arr.push({ en, cn });
        }
    }
    return arr;
}

// 导出单词为文本
function exportWordText(list) {
    let str = "";
    list.forEach(w => str += `${w.en} ${w.cn}\n`);
    return str.trim();
}

function renderGroupSelect() {
    el.groupSelect.innerHTML = "";
    state.groupList.forEach(name => {
        const opt = document.createElement("option");
        opt.value = name;
        opt.innerText = name;
        if (name === state.activeGroup) opt.selected = true;
        el.groupSelect.appendChild(opt);
    });
    updateWordCountTip();
}

// 更新设置页的词库数量提示
function updateWordCountTip() {
    const wordList = state.groupWordData[state.activeGroup] || [];
    el.wordCountTip.innerText = wordList.length;
}

// 数组乱序（Fisher-Yates 算法）
function shuffleArray(arr) {
    const copy = [...arr];
    for (let i = copy.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [copy[i], copy[j]] = [copy[j], copy[i]];
    }
    return copy;
}

// 渲染关卡网格
function renderLevelGrid() {
    el.levelBox.innerHTML = "";
    const maxLevel = state.activeStar === 1 ? 21 : 36;
    const wordList = state.groupWordData[state.activeGroup] || [];
    const maxAvaliableLevel = Math.floor(wordList.length / state.perLevelWordCount) || 1;

    for (let i = 1; i <= maxLevel; i++) {
        const isOverMaxAvaliable = i > maxAvaliableLevel;
        const key = `${state.activeGroup}_star${state.activeStar}_lv${i}`;
        const levelRecord = state.progress[key] || {
            cnToEn: false,
            enToCn: false,
            listenToCn: false,
            matchLink: false
        };
        const allDone = levelRecord.cnToEn && levelRecord.enToCn && levelRecord.listenToCn && levelRecord.matchLink;
        
        let canOpen = false;
        if (state.activeStar === 1 && i === 1) {
            canOpen = true;
        } else if (!isOverMaxAvaliable) {
            const prevKey = `${state.activeGroup}_star${state.activeStar}_lv${i - 1}`;
            const prevRec = state.progress[prevKey] || {
                cnToEn: false,
                enToCn: false,
                listenToCn: false,
                matchLink: false
            };
            canOpen = prevRec.cnToEn && prevRec.enToCn && prevRec.listenToCn && prevRec.matchLink;
        }

        const item = document.createElement("div");
        item.className = `level-item ${(canOpen && !isOverMaxAvaliable) ? "" : "lock"}`;
        
        const doneCount = [levelRecord.cnToEn, levelRecord.enToCn, levelRecord.listenToCn, levelRecord.matchLink].filter(Boolean).length;
        item.innerHTML = `
            <div class="level-num">${i}</div>
            <div class="level-count">${isOverMaxAvaliable ? "词库不足" : (allDone ? "全部通关" : `已完成${doneCount}/4题型`)}</div>
            <div class="level-star ${doneCount === 4 ? "" : "empty"}">★</div>
        `;

        if (canOpen && !isOverMaxAvaliable) {
            item.onclick = () => startLevel(i);
        }
        el.levelBox.appendChild(item);
    }
}

// 验证密码后打开分组管理
function openGroupMaskAfterPwd() {
    const inputPwd = el.pwdInput.value.trim();
    if (inputPwd === CONFIG.ADMIN_PASSWORD) {
        el.pwdMask.classList.remove("show");
        el.pwdInput.value = "";
        el.groupMask.classList.add("show");
    } else {
        alert("密码错误，请重新输入");
        el.pwdInput.focus();
    }
}

// 开始关卡
function startLevel(lvNum) {
    const wordList = state.groupWordData[state.activeGroup] || [];
    const total = state.perLevelWordCount;
    const maxLevel = Math.floor(wordList.length / total);

    if (lvNum > maxLevel && maxLevel > 0) {
        alert(`当前分组词库仅支持${maxLevel}个关卡，请导入更多单词或减少单关数量`);
        return;
    }

    state.currentLevel = lvNum;
    state.qIndex = 0;
    state.rightCount = 0;
    state.wrongCount = 0;
    state.combo = 0;
    answeringLock = false;
    clearTimeout(globalTimer);

    el.homePanel.classList.remove("show");
    el.answerPanel.classList.add("show");
    el.levelTag.innerText = `${state.activeStar === 1 ? "一星" : "二星"} 第${lvNum}关`;

    const startIdx = (lvNum - 1) * total;
    const endIdx = startIdx + total;
    state.levelWordList = wordList.slice(startIdx, endIdx);

    if (state.levelWordList.length === 0) {
        alert("当前关卡无可用单词，请检查词库配置");
        el.answerPanel.classList.remove("show");
        el.homePanel.classList.add("show");
        return;
    }

    state.useWrongLib = false;
    const modeInfo = getCurrentModeInfo();
    el.questionTip.innerText = modeInfo.tip;
    el.listenSpeakerBtn.classList.toggle("show", modeInfo.hideQuesText === true);

    if (state.activeMode === "matchLink") {
        openMatchGame();
        return;
    }

    renderQuestion();
}

// 获取当前模式信息
function getCurrentModeInfo() {
    const modeMap = {
        cnToEn: {
            name: "中译英",
            tip: "选择对应的英文单词，选项每次随机打乱",
            hideQuesText: false
        },
        enToCn: {
            name: "英译中",
            tip: "选择对应的中文释义，每个中文选项带发音按钮，点击朗读单词",
            hideQuesText: false
        },
        listenToCn: {
            name: "听音选词",
            tip: "点击顶部喇叭播放单词，中文选项带发音按钮，答对自动朗读下一题",
            hideQuesText: true
        },
        matchLink: {
            name: "单词配对",
            tip: "每页8组单词，点英文可朗读，完成本页全部自动切下一页，全页完成才算通关",
            hideQuesText: false
        }
    };
    return modeMap[state.activeMode] || modeMap.cnToEn;
}

// 渲染题目
function renderQuestion() {
    if (state.qIndex >= state.levelWordList.length) {
        finishLevelTask();
        return;
    }

    const word = state.levelWordList[state.qIndex];
    state.currentAudioWord = word.en;

    const modeInfo = getCurrentModeInfo();
    if (state.activeMode === "cnToEn") el.qText.innerText = word.cn;
    else if (state.activeMode === "enToCn") el.qText.innerText = word.en;
    else if (state.activeMode === "listenToCn") el.qText.innerText = "";

    const allPool = state.groupWordData[state.activeGroup] || [];
    const rightItem = word;
    let optList = [rightItem];
    
    const rest = allPool.filter(w => w.en !== word.en);
    const randomRest = shuffleArray(rest).slice(0, 3);
    optList = optList.concat(randomRest);
    while (optList.length < 4) {
        optList.push(...shuffleArray(rest).slice(0, 4 - optList.length));
    }
    optList = shuffleArray(optList);

    renderOptionList(optList, rightItem);

    el.progressNum.innerText = `${state.qIndex + 1}/${state.levelWordList.length}`;
    el.rightNum.innerText = state.rightCount;
    el.wrongNum.innerText = state.wrongCount;
    el.comboNum.innerText = state.combo;

    if (state.activeMode === "listenToCn") {
        setTimeout(() => {
            speakWord(word.en);
        }, 300);
    }
}

// 渲染选项列表
function renderOptionList(list, target) {
    el.optionBox.innerHTML = "";
    list.forEach(opt => {
        const div = document.createElement("div");
        div.className = "answer-option";

        if (state.activeMode === "cnToEn") {
            div.innerHTML = `<span>${opt.en}</span><span class="voice-icon">🔊</span>`;
        } else {
            div.innerHTML = `<span>${opt.cn}</span><span class="voice-icon">🔊</span>`;
        }

        div.onclick = function (e) {
            initAudioOnce();
            if (e.target.classList.contains("voice-icon")) {
                e.stopPropagation();
                speakWord(opt.en);
                return;
            }
            selectAnswer(opt, target, state.activeMode);
        };
        el.optionBox.appendChild(div);
    });
}

// 选择答案处理
function selectAnswer(selWord, realWord, mode) {
    if (answeringLock) return;
    answeringLock = true;
    clearTimeout(globalTimer);

    const items = el.optionBox.querySelectorAll(".answer-option");
    const isCorrect = selWord.en === realWord.en;

    items.forEach(item => {
        const txt = item.querySelector("span").innerText;
        let targetEn = "";
        
        if (mode === "cnToEn") {
            targetEn = txt;
        } else {
            const match = state.groupWordData[state.activeGroup].find(w => w.cn === txt);
            targetEn = match ? match.en : "";
        }

        if (targetEn === realWord.en) {
            item.classList.add("right");
        } else if (targetEn === selWord.en && !isCorrect) {
            item.classList.add("wrong");
        }
    });

    speakWord(realWord.en);

    setTimeout(() => {
        if (isCorrect) {
            state.rightCount++;
            state.combo++;
            playTone("right");
        } else {
            state.wrongCount++;
            state.combo = 0;
            playTone("wrong");
            if (!state.wrongWords.find(w => w.en === realWord.en)) {
                state.wrongWords.push(realWord);
                saveAllData();
            }
        }

        answeringLock = false;
        state.qIndex++;

        if (state.qIndex >= state.levelWordList.length) {
            finishLevelTask();
            return;
        }

        renderQuestion();
    }, 1000);
}

// 完成关卡任务
function finishLevelTask() {
    clearTimeout(globalTimer);
    answeringLock = false;
    el.listenSpeakerBtn.classList.remove("show");

    const key = `${state.activeGroup}_star${state.activeStar}_lv${state.currentLevel}`;
    if (!state.progress[key]) {
        state.progress[key] = {
            cnToEn: false,
            enToCn: false,
            listenToCn: false,
            matchLink: false
        };
    }
    state.progress[key][state.activeMode] = true;
    saveAllData();
    renderLevelGrid();

    const total = state.levelWordList.length;
    const rate = total === 0 ? 0 : Math.round(state.rightCount / total * 100);
    const rec = state.progress[key];
    const doneNum = [rec.cnToEn, rec.enToCn, rec.listenToCn, rec.matchLink].filter(Boolean).length;

    alert(`本题型完成！
答对：${state.rightCount} / ${total}
正确率：${rate}%
最高连击：${state.combo}
当前关卡已完成${doneNum}/4个题型，全部通关才可解锁下一关`);

    el.answerPanel.classList.remove("show");
    el.homePanel.classList.add("show");
}

// 打开配对游戏
function openMatchGame() {
    if (state.levelWordList.length === 0) {
        alert("请先进入关卡加载单词");
        return;
    }

    el.matchMask.classList.add("show");
    state.matchAllWords = [...state.levelWordList];
    state.matchCurPage = 1;
    state.matchAllFinish = 0;
    state.matchTotalPage = Math.ceil(state.matchAllWords.length / state.matchPageSize);
    
    el.matchAllTotal.innerText = state.matchAllWords.length;
    loadMatchPage();
}

// 加载配对页面
function loadMatchPage() {
    state.matchCurPageFinish = 0;
    state.matchSelectCard = null;
    el.enListBox.innerHTML = "";
    el.cnListBox.innerHTML = "";

    const startIdx = (state.matchCurPage - 1) * state.matchPageSize;
    const endIdx = startIdx + state.matchPageSize;
    const pageWords = state.matchAllWords.slice(startIdx, endIdx);
    
    el.matchPageTip.innerText = `第${state.matchCurPage}页 / 共${state.matchTotalPage}页`;
    el.matchCurPageTotal.innerText = pageWords.length;
    el.matchCurPage.innerText = state.matchCurPageFinish;
    el.matchTotalDone.innerText = state.matchAllFinish;

    const enData = pageWords.map(w => ({ type: "en", content: w.en, data: w }));
    const cnData = pageWords.map(w => ({ type: "cn", content: w.cn, data: w }));

    enData.forEach(info => {
        const div = document.createElement("div");
        div.className = "match-card";
        div.innerText = info.content;
        div.dataset.en = info.data.en;
        div.dataset.type = info.type;
        div.onclick = () => {
            speakWord(info.data.en);
            matchCardClick(div, info);
        };
        el.enListBox.appendChild(div);
    });

    shuffleArray(cnData).forEach(info => {
        const div = document.createElement("div");
        div.className = "match-card";
        div.innerText = info.content;
        div.dataset.en = info.data.en;
        div.dataset.type = info.type;
        div.onclick = () => {
            matchCardClick(div, info);
        };
        el.cnListBox.appendChild(div);
    });

    el.prevMatchPageBtn.disabled = state.matchCurPage <= 1;
    el.nextMatchPageBtn.disabled = state.matchCurPage >= state.matchTotalPage;
}

// 配对卡片点击处理
// 配对卡片点击处理【优化修复版】
function matchCardClick(dom, info) {
    // 已配对完成的卡片禁止操作
    if (dom.classList.contains("match")) return;

    // 场景1：当前没有任何选中卡片，直接选中当前点击项
    if (!state.matchSelectCard) {
        state.matchSelectCard = dom;
        dom.classList.add("select");
        // 点击英文单词只朗读，不报错
        if(info.type === "en") speakWord(info.data.en);
        return;
    }

    // 场景2：已有选中卡片
    const prevDom = state.matchSelectCard;
    const prevEn = prevDom.dataset.en;
    const curEn = dom.dataset.en;
    const prevType = prevDom.dataset.type;
    const curType = dom.dataset.type;

    // 情况A：两次点击同一张卡片 → 取消选中
    if (prevDom === dom) {
        prevDom.classList.remove("select");
        state.matchSelectCard = null;
        return;
    }

    // 情况B：选中的是同类型（两次英文 / 两次中文），取消上一次选中，新选当前
    if (prevType === curType) {
        prevDom.classList.remove("select");
        state.matchSelectCard = dom;
        dom.classList.add("select");
        if(info.type === "en") speakWord(info.data.en);
        return;
    }

    // 情况C：不同类型，英文+中文，判断单词是否匹配
    if (prevEn === curEn) {
        // 匹配成功
        prevDom.classList.remove("select");
        dom.classList.remove("select");
        prevDom.classList.add("match");
        dom.classList.add("match");
        
        state.matchCurPageFinish++;
        state.matchAllFinish++;
        el.matchCurPage.innerText = state.matchCurPageFinish;
        el.matchTotalDone.innerText = state.matchAllFinish;
        playTone("right");

        const currentPageTotal = Number(el.matchCurPageTotal.innerText);
        if (state.matchCurPageFinish >= currentPageTotal) {
            if (state.matchCurPage >= state.matchTotalPage) {
                setTimeout(() => {
                    const key = `${state.activeGroup}_star${state.activeStar}_lv${state.currentLevel}`;
                    if (!state.progress[key]) {
                        state.progress[key] = {
                            cnToEn: false,
                            enToCn: false,
                            listenToCn: false,
                            matchLink: false
                        };
                    }
                    state.progress[key].matchLink = true;
                    saveAllData();
                    renderLevelGrid();
                    
                    alert(`本关卡全部${state.matchAllWords.length}组单词配对完成！
已完成配对题型，可继续挑战其他题型`);
                    
                    el.matchMask.classList.remove("show");
                    el.answerPanel.classList.remove("show");
                    el.homePanel.classList.add("show");
                }, 800);
            } else {
                setTimeout(() => {
                    alert(`本页${currentPageTotal}组配对完成，进入下一页`);
                    state.matchCurPage++;
                    loadMatchPage();
                }, 800);
            }
        }
        // 清空选中缓存
        state.matchSelectCard = null;
    } else {
        // 单词不匹配，播放错误音效，取消全部选中
        playTone("wrong");
        prevDom.classList.remove("select");
        dom.classList.remove("select");
        state.matchSelectCard = null;
    }
}
// 绑定事件监听
function bindEvents() {
    el.modeTabs.forEach(tab => {
        tab.addEventListener("click", () => {
            el.modeTabs.forEach(t => t.classList.remove("active"));
            tab.classList.add("active");
            state.activeMode = tab.dataset.mode;
            renderLevelGrid();
        });
    });

    el.starTabs.forEach(tab => {
        tab.addEventListener("click", () => {
            el.starTabs.forEach(t => t.classList.remove("active"));
            tab.classList.add("active");
            state.activeStar = Number(tab.dataset.star);
            renderLevelGrid();
        });
    });

    el.backHomeBtn.addEventListener("click", () => {
        clearTimeout(globalTimer);
        el.answerPanel.classList.remove("show");
        el.homePanel.classList.add("show");
    });

    el.listenSpeakerBtn.addEventListener("click", () => {
        speakWord(state.currentAudioWord);
    });

    el.openGroupManageBtn.addEventListener("click", () => {
        el.pwdInput.value = "";
        el.pwdMask.classList.add("show");
    });
    el.closePwdMask.addEventListener("click", () => {
        el.pwdMask.classList.remove("show");
    });
    el.pwdCancelBtn.addEventListener("click", () => {
        el.pwdMask.classList.remove("show");
    });
    el.pwdConfirmBtn.addEventListener("click", openGroupMaskAfterPwd);

    el.openSettingBtn.addEventListener("click", () => {
        el.voiceSet.value = CONFIG.AUDIO.voiceAccent;
        el.soundSwitch.checked = CONFIG.AUDIO.soundEnable;
        el.settingMask.classList.add("show");
        updateWordCountTip();
    });
    el.closeSettingMask.addEventListener("click", () => {
        el.settingMask.classList.remove("show");
    });
    el.saveSettingBtn.addEventListener("click", () => {
        CONFIG.AUDIO.voiceAccent = el.voiceSet.value;
        CONFIG.AUDIO.soundEnable = el.soundSwitch.checked;
        const perLevel = Number(el.perLevelSet.value);
        if (perLevel < 5 || perLevel > 50) {
            alert("单关单词数量需在5-50之间");
            return;
        }
        state.perLevelWordCount = perLevel;
        saveAllData();
        el.settingMask.classList.remove("show");
        renderLevelGrid();
        alert("设置已保存");
    });
    el.resetProgressBtn.addEventListener("click", () => {
        if (confirm("确定要清空所有闯关记录吗？此操作不可恢复！")) {
            state.progress = {};
            saveAllData();
            renderLevelGrid();
            alert("闯关记录已清空");
        }
    });
    el.clearAllDataBtn.addEventListener("click", () => {
        if (confirm("确定要清空所有本地数据（包括词库、进度、错题）吗？此操作不可恢复！")) {
            Storage.clearAll();
            initStorageData();
            renderGroupSelect();
            renderLevelGrid();
            alert("所有本地数据已清空");
        }
    });

    el.closeGroupMask.addEventListener("click", () => {
        el.groupMask.classList.remove("show");
    });
    el.createGroupBtn.addEventListener("click", () => {
        const name = el.newGroupName.value.trim();
        if (!name) {
            alert("请输入分组名称");
            return;
        }
        if (state.groupList.includes(name)) {
            alert("分组名称已存在");
            return;
        }
        state.groupList.push(name);
        state.groupWordData[name] = [];
        el.newGroupName.value = "";
        saveAllData();
        renderGroupSelect();
        alert(`分组「${name}」创建成功`);
    });
    el.delGroupBtn.addEventListener("click", () => {
        if (state.groupList.length <= 1) {
            alert("至少保留一个分组");
            return;
        }
        if (confirm(`确定要删除分组「${state.activeGroup}」吗？该分组下的所有单词也会被删除！`)) {
            const idx = state.groupList.indexOf(state.activeGroup);
            state.groupList.splice(idx, 1);
            delete state.groupWordData[state.activeGroup];
            state.activeGroup = state.groupList[0];
            saveAllData();
            renderGroupSelect();
            el.groupMask.classList.remove("show");
            alert("分组已删除");
        }
    });
    el.importWordBtn.addEventListener("click", () => {
        const text = el.importTextarea.value.trim();
        if (!text) {
            alert("请输入要导入的单词内容");
            return;
        }
        const newWords = parseImportText(text);
        if (newWords.length === 0) {
            alert("未解析到有效单词，请检查格式");
            return;
        }
        const currentWords = state.groupWordData[state.activeGroup] || [];
        const enSet = new Set(currentWords.map(w => w.en));
        const filterWords = newWords.filter(w => !enSet.has(w.en));
        state.groupWordData[state.activeGroup] = [...currentWords, ...filterWords];
        saveAllData();
        el.importTextarea.value = "";
        updateWordCountTip();
        alert(`成功导入${filterWords.length}个新单词（${newWords.length - filterWords.length}个重复）`);
    });
    el.replaceImportBtn.addEventListener("click", () => {
        const text = el.importTextarea.value.trim();
        if (!text) {
            alert("请输入要导入的单词内容");
            return;
        }
        const newWords = parseImportText(text);
        if (newWords.length === 0) {
            alert("未解析到有效单词，请检查格式");
            return;
        }
        if (confirm("确定要覆盖当前分组的所有单词吗？此操作不可恢复！")) {
            state.groupWordData[state.activeGroup] = newWords;
            saveAllData();
            el.importTextarea.value = "";
            updateWordCountTip();
            alert(`成功覆盖导入${newWords.length}个单词`);
        }
    });
    el.exportWordBtn.addEventListener("click", () => {
        const words = state.groupWordData[state.activeGroup] || [];
        if (words.length === 0) {
            alert("当前分组无单词可导出");
            return;
        }
        const text = exportWordText(words);
        const blob = new Blob([text], { type: "text/plain;charset=utf-8" });
        const a = document.createElement("a");
        a.href = URL.createObjectURL(blob);
        a.download = `${state.activeGroup}_单词库.txt`;
        a.click();
        URL.revokeObjectURL(a.href);
    });
    el.groupSelect.addEventListener("change", () => {
        state.activeGroup = el.groupSelect.value;
        saveAllData();
        renderLevelGrid();
        updateWordCountTip();
    });

    el.wrongReviewBtn.addEventListener("click", () => {
        if (state.wrongWords.length === 0) {
            alert("暂无错题可复习");
            return;
        }
        state.useWrongLib = true;
        state.levelWordList = shuffleArray([...state.wrongWords]);
        state.qIndex = 0;
        state.rightCount = 0;
        state.wrongCount = 0;
        state.combo = 0;
        answeringLock = false;

        el.homePanel.classList.remove("show");
        el.answerPanel.classList.add("show");
        el.levelTag.innerText = "错题复习";
        const modeInfo = getCurrentModeInfo();
        el.questionTip.innerText = `错题复习 - ${modeInfo.tip}`;
        el.listenSpeakerBtn.classList.toggle("show", modeInfo.hideQuesText === true);
        renderQuestion();
    });

    el.closeMatchBtn.addEventListener("click", () => {
        el.matchMask.classList.remove("show");
    });
    el.prevMatchPageBtn.addEventListener("click", () => {
        if (state.matchCurPage > 1) {
            state.matchCurPage--;
            loadMatchPage();
        }
    });
    el.nextMatchPageBtn.addEventListener("click", () => {
        if (state.matchCurPage < state.matchTotalPage) {
            state.matchCurPage++;
            loadMatchPage();
        }
    });
}

// 页面初始化入口
function init() {
    initStorageData();
    initVoiceSynthesis();
    renderGroupSelect();
    renderLevelGrid();
    bindEvents();
}
init();
</script>
